name: Cleanup Old Pre-Releases

on:
  workflow_run:
    workflows: ["Build Release/Pre-Release (Main Branch)"]
    types:
      - completed

# Workflow needs contents: write to delete the release assets, but nothing
# else. The workflow_run trigger normally hands the cleanup workflow
# GITHUB_TOKEN with the same scope as the parent — declaring it explicitly
# keeps the surface bounded if the parent's scope grows later.
permissions:
  contents: write

jobs:
  cleanup:
    name: Cleanup Old Pre-Releases
    runs-on: ubuntu-latest
    steps:
      - name: Delete old pre-releases
        # SHA-pinned — equivalent to tag v0.3.4 at time of pin. Bump alongside
        # Dependabot PRs (see .github/dependabot.yml).
        uses: dev-drprasad/delete-older-releases@dfbe6be2a006e9475dfcbe5b8d201f1824c2a9fe # v0.3.4
        with:
          delete_expired_data: '90'
          delete_prerelease_only: 'true'
          keep_latest: '3'
          keep_min_download_counts: '5'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
