name: Test Build (Pull Request)

on: pull_request

# Least-privilege default for the workflow's GITHUB_TOKEN. PR test builds only
# need to check out source, run Maven, and upload artifacts — none of those
# require write access to repo contents. Individual jobs can grant more later
# if needed; nothing currently does.
permissions:
  contents: read

jobs:
  # Resolve the revision once on a Linux runner, then fan out to the platform
  # builds. We *can't* rely on the derive-revision-from-git step in pom.xml:
  # Maven resolves <version>${revision}</version> during model-building, which
  # runs BEFORE the initialize phase, so any property the gmavenplus script
  # mutates at initialize is invisible to flatten / the jar plugin (those read
  # the frozen model). Passing -Drevision= on the CLI sidesteps this — user
  # properties win during model interpolation — which is why the release
  # workflow's build jobs work and the gmavenplus path alone does not.
  prepare:
    name: Compute Test Build Version
    runs-on: ubuntu-latest
    outputs:
      revision: ${{ steps.version.outputs.revision }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve revision from git describe
        id: version
        shell: bash
        run: |
          REV=$(git describe --tags --dirty=.dirty --always)
          echo "revision=$REV" >> $GITHUB_OUTPUT
          echo "Resolved revision: $REV"

  build-windows:
    name: Test Build (Windows)
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 26 (Zulu FX)
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '26'
          java-package: jdk+fx
          cache: 'maven'

      # WiX 3.14 ships on windows-latest runners but isn't on PATH. jpackage's
      # MSI generation shells out to `light.exe`, and the Burn bootstrapper
      # steps need `candle.exe` / `light.exe` too — without this the Windows
      # `package` phase fails before the first MSI is written.
      - name: Set path for WiX Toolset
        run: echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" >> $GITHUB_PATH
        shell: bash

      - name: Build and package
        run: mvn -B package --file pom.xml -Drevision=${{ needs.prepare.outputs.revision }}

      # Mirror the release workflow's flat staging + scope-suffix rename so PR
      # downloads are labeled the same way the eventual release will be.
      - name: Stage Windows installers with scope-suffixed names
        shell: bash
        run: |
          mkdir -p windows-dist
          cp "build/packaging/Mica Minecraft Launcher Setup.exe" windows-dist/
          cp build/packaging/user/*.msi    "windows-dist/Mica Minecraft Launcher-user.msi"
          cp build/packaging/machine/*.msi "windows-dist/Mica Minecraft Launcher-system.msi"
          ls -la windows-dist/

      - name: Upload Windows test-build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-x64-pr${{ github.event.pull_request.number }}
          path: windows-dist/*
          retention-days: 14
          if-no-files-found: error

  build-macos-arm:
    name: Test Build (macOS arm64)
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 26 (Zulu FX)
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '26'
          java-package: jdk+fx
          cache: 'maven'

      - name: Build and package
        run: mvn -B package --file pom.xml

      # Mirror the release workflow's flat staging + arch-suffix rename so
      # PR downloads are labeled the same way the eventual release will be,
      # and so the arm/intel uploads don't share filenames.
      - name: Stage macOS arm64 installers with arch-suffixed names
        shell: bash
        run: |
          mkdir -p macos-arm-dist
          for f in build/packaging/*.dmg; do
            base=$(basename "$f" .dmg)
            cp "$f" "macos-arm-dist/${base}-arm64.dmg"
          done
          for f in build/packaging/*.pkg; do
            base=$(basename "$f" .pkg)
            cp "$f" "macos-arm-dist/${base}-arm64.pkg"
          done
          ls -la macos-arm-dist/

      - name: Upload macOS arm64 test-build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm64-pr${{ github.event.pull_request.number }}
          path: macos-arm-dist/*
          retention-days: 14
          if-no-files-found: error

  # Intel coverage on PRs so x64-specific regressions surface before merge,
  # not after the release workflow runs on main. macos-15-intel is the
  # current x86_64-capable GHA runner — GitHub retired the macos-13 image
  # on 2025-12-08, so jobs requesting `macos-13` now queue indefinitely
  # (no runner with that label exists). Apple Silicon `macos-latest` only
  # produces arm64 binaries, so a distinct Intel runner is still needed
  # until GitHub fully drops x86_64 macOS support in Fall 2027.
  build-macos-intel:
    name: Test Build (macOS x64 Intel)
    runs-on: macos-15-intel
    steps:
      # See build-windows checkout step for why both fetch-depth: 0 and
      # fetch-tags: true are required to get a real version into the artifact.
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 26 (Zulu FX)
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '26'
          java-package: jdk+fx
          cache: 'maven'

      - name: Build and package
        run: mvn -B package --file pom.xml

      - name: Stage macOS Intel installers with arch-suffixed names
        shell: bash
        run: |
          mkdir -p macos-intel-dist
          for f in build/packaging/*.dmg; do
            base=$(basename "$f" .dmg)
            cp "$f" "macos-intel-dist/${base}-intel.dmg"
          done
          for f in build/packaging/*.pkg; do
            base=$(basename "$f" .pkg)
            cp "$f" "macos-intel-dist/${base}-intel.pkg"
          done
          ls -la macos-intel-dist/

      - name: Upload macOS x64 test-build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-x64-pr${{ github.event.pull_request.number }}
          path: macos-intel-dist/*
          retention-days: 14
          if-no-files-found: error

  build-linux:
    name: Test Build (Linux)
    runs-on: ubuntu-latest
    steps:
      # See build-windows checkout step for why both fetch-depth: 0 and
      # fetch-tags: true are required to get a real version into the artifact.
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 26 (Zulu FX)
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '26'
          java-package: jdk+fx
          cache: 'maven'

      - name: Install packaging tools
        run: sudo apt-get install -y dpkg fakeroot rpm

      - name: Build and package
        run: mvn -B package --file pom.xml

      - name: Upload Linux test-build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-x64-pr${{ github.event.pull_request.number }}
          path: |
            build/packaging/*.deb
            build/packaging/*.rpm
          retention-days: 14
          if-no-files-found: error

      - name: Upload fat JAR test-build artifact
        uses: actions/upload-artifact@v7
        with:
          name: fat-jar-pr${{ github.event.pull_request.number }}
          path: build/target/*-jar-with-dependencies.jar
          retention-days: 14
          if-no-files-found: error
