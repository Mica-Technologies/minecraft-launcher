name: Test Build (Pull Request)

on: pull_request

jobs:
  build-windows:
    name: Test Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25 (Zulu FX)
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '25'
          java-package: jdk+fx
          cache: 'maven'

      # WiX 3.14 ships on windows-latest runners but isn't on PATH. jpackage's
      # MSI generation shells out to `light.exe`, and the Burn bootstrapper
      # steps need `candle.exe` / `light.exe` too — without this the Windows
      # `package` phase fails before the first MSI is written.
      - name: Set path for WiX Toolset
        run: echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" >> $GITHUB_PATH
        shell: bash

      - name: Build and package
        run: mvn -B package --file pom.xml

      # Mirror the release workflow's flat staging + scope-suffix rename so PR
      # downloads are labeled the same way the eventual release will be.
      - name: Stage Windows installers with scope-suffixed names
        shell: bash
        run: |
          mkdir -p windows-dist
          cp "build/packaging/Mica Minecraft Launcher Setup.exe" windows-dist/
          cp build/packaging/user/*.msi    "windows-dist/Mica Minecraft Launcher-user.msi"
          cp build/packaging/machine/*.msi "windows-dist/Mica Minecraft Launcher-system.msi"
          ls -la windows-dist/

      - name: Upload Windows test-build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-x64-pr${{ github.event.pull_request.number }}
          path: windows-dist/*
          retention-days: 14
          if-no-files-found: error

  build-macos:
    name: Test Build (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25 (Zulu FX)
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '25'
          java-package: jdk+fx
          cache: 'maven'

      - name: Build and package
        run: mvn -B package --file pom.xml

      - name: Upload macOS test-build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm64-pr${{ github.event.pull_request.number }}
          path: |
            build/packaging/*.dmg
            build/packaging/*.pkg
          retention-days: 14
          if-no-files-found: error

  build-linux:
    name: Test Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25 (Zulu FX)
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '25'
          java-package: jdk+fx
          cache: 'maven'

      - name: Install packaging tools
        run: sudo apt-get install -y dpkg fakeroot rpm

      - name: Build and package
        run: mvn -B package --file pom.xml

      - name: Upload Linux test-build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-x64-pr${{ github.event.pull_request.number }}
          path: |
            build/packaging/*.deb
            build/packaging/*.rpm
          retention-days: 14
          if-no-files-found: error

      - name: Upload fat JAR test-build artifact
        uses: actions/upload-artifact@v7
        with:
          name: fat-jar-pr${{ github.event.pull_request.number }}
          path: build/target/*-jar-with-dependencies.jar
          retention-days: 14
          if-no-files-found: error
