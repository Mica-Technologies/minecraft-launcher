name: Build Release/Pre-Release (Main Branch)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a full release (otherwise pre-release)'
        required: false
        default: 'false'

# Default for the workflow's GITHUB_TOKEN: read everything. The release publish
# job below grants itself contents: write where it actually needs to create
# release assets — the rest of the matrix only builds + uploads workflow-scoped
# artifacts and doesn't need any repo-write permission.
permissions:
  contents: read

jobs:
  # --- Step 1: Calculate version and create tag ---
  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest
    # The "Create git tag" step pushes the computed tag back to the repo, which
    # needs write access to refs. The workflow-level default is contents: read
    # so other jobs can't accidentally write — grant write only on this job,
    # not the matrix builders (which only upload workflow-scoped artifacts).
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_release: ${{ steps.version.outputs.is_release }}
      win_version: ${{ steps.version.outputs.win_version }}
    steps:
      # fetch-tags: true alongside fetch-depth: 0 — the version calculation
      # below scans `git tag -l "${BASE_VERSION}.*"` to pick the next same-day
      # `.N` bump, which silently picks the wrong N if any tags are missing.
      # depth 0 alone has been observed to skip tags in some checkout paths.
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      # Mirrors the date-based version scheme from our Gradle Minecraft mod projects
      # (see e.g. minecraft-city-super-mod). Three deviations worth flagging:
      #   - The mod uses SemVer `+N` build metadata for same-day re-releases
      #     (e.g. `2026.05.12+1`). jpackage on macOS rejects `+` in --app-version
      #     (it requires pure N.N.N), AND the in-app update comparator's
      #     SemVer-correct treatment of build metadata is "ignore for precedence",
      #     so two same-day `+N` bumps would compare as equal and users would
      #     never be prompted to grab the bump. We use a 4th numeric tuple (.N)
      #     instead — installs cleanly via jpackage, sorts correctly in the
      #     comparator, and stays human-readable on the GH releases page.
      #   - Pre-release format matches the mod's verbatim, including the slightly
      #     redundant `%Z%z` (yields `UTC+0000` under -u) for parity with the
      #     mod's existing tag history.
      #   - Windows MSI ProductVersion's major <= 255 constraint forces a 2-digit
      #     year, so the win_version is derived from the release version by
      #     stripping the first two chars of the year (e.g. `2026.05.12.1`
      #     -> `26.05.12.1`). 4-tuple is valid for MSI.
      - name: Calculate version numbers
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short "${{ github.sha }}")
          IS_RELEASE=${{ github.event.inputs.release == 'true' && github.event.inputs.release || 'false' }}

          BASE_VERSION=$(date -u +'%Y.%m.%d')

          if [ "$IS_RELEASE" = "true" ]; then
            # If today's base tag (or any `.N` bump of it) already exists, claim
            # the next sequential .N. Otherwise use the bare base version.
            git fetch --tags --quiet origin || true
            REL_VERSION="$BASE_VERSION"
            maxN=-1
            if git rev-parse -q --verify "refs/tags/$BASE_VERSION" >/dev/null 2>&1; then
              maxN=0
            fi
            for existingTag in $(git tag -l "${BASE_VERSION}.*"); do
              suffix="${existingTag#${BASE_VERSION}.}"
              if [[ "$suffix" =~ ^[0-9]+$ ]] && [ "$suffix" -gt "$maxN" ]; then
                maxN="$suffix"
              fi
            done
            if [ "$maxN" -ge 0 ]; then
              REL_VERSION="${BASE_VERSION}.$((maxN + 1))"
            fi
            TAG="$REL_VERSION"
            VERSION="$REL_VERSION"
          else
            # Pre-release: YYYY.MM.DD-pre.HHMM.UTC+0000+SHORTSHA. Matches the mod
            # workflow's format. The double `+` (UTC+0000+sha) is intentional —
            # `%Z%z` under `date -u` emits `UTC+0000`, and the SHA is concatenated
            # after as additional build metadata. Pre-release tags never feed
            # the in-app update comparator (GH /releases/latest filters them).
            PRE_SUFFIX=$(date -u +'pre.%H%M.%Z%z')"+$SHORT_SHA"
            TAG="${BASE_VERSION}-${PRE_SUFFIX}"
            VERSION="${BASE_VERSION}-${PRE_SUFFIX}"
          fi

          # win_version: strip the first 2 digits of the year (2026 -> 26) to keep
          # MSI ProductVersion major <= 255. Keep everything after the year intact,
          # which preserves any .N same-day bump.
          WIN_VERSION="${VERSION#??}"
          # Strip pre-release/build-metadata suffix from win_version; MSI doesn't
          # accept those characters either.
          WIN_VERSION="${WIN_VERSION%%-*}"
          WIN_VERSION="${WIN_VERSION%%+*}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "win_version=$WIN_VERSION" >> $GITHUB_OUTPUT
          echo "Computed version: $VERSION (tag: $TAG, win: $WIN_VERSION)"

      - name: Create git tag
        run: |
          git tag "${{ steps.version.outputs.tag }}" "${{ github.sha }}"
          git push origin "${{ steps.version.outputs.tag }}"

  # --- Step 2: Build on all platforms ---
  build-windows:
    name: Build Windows (x64)
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 26 (Zulu FX)
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '26'
          java-package: jdk+fx
          cache: 'maven'

      - name: Set path for WiX Toolset
        run: echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" >> $GITHUB_PATH
        shell: bash

      # The Windows packaging profile produces three artifacts in `package`:
      #   build/packaging/user/<name>-<ver>.msi      (per-user MSI, no UAC)
      #   build/packaging/machine/<name>-<ver>.msi   (per-machine MSI, requires UAC)
      #   build/packaging/<name> Setup.exe           (Burn bootstrapper, picks scope)
      # A single `mvn -B package` runs all of jpackage-user, jpackage-machine,
      # burn-candle and burn-light — no follow-up `exec:exec@jpackage` is needed.
      #
      # shell: bash is required — PowerShell 7 tokenizes the dotted revision
      # value (e.g. "2026.05.13") on the first `.`, passing "-Drevision=2026"
      # and ".05.13" to mvn as two separate args. Maven then interprets the
      # dotted tail as a lifecycle phase and aborts with "Unknown lifecycle
      # phase". Git Bash handles dotted args verbatim. (Same fix applied to
      # the test-build workflow's Windows job.)
      - name: Build and package (Burn bootstrapper EXE + per-user MSI + per-machine MSI)
        shell: bash
        run: >
          mvn -B package --file pom.xml
          -Drevision=${{ needs.prepare.outputs.version }}
          -Djpackage.app.version=${{ needs.prepare.outputs.win_version }}

      # Both per-scope MSIs land at the same jpackage-chosen filename — `user/`
      # and `machine/` directory prefixes are the only thing distinguishing them.
      # Collapse them to a flat staging dir with `-user` / `-system` suffixes so
      # the release page surfaces three clearly-labeled downloads.
      - name: Stage Windows installers with scope-suffixed names
        shell: bash
        run: |
          mkdir -p windows-dist
          cp "build/packaging/Mica Minecraft Launcher Setup.exe" windows-dist/
          cp "build/packaging/user/Mica Minecraft Launcher-${{ needs.prepare.outputs.win_version }}.msi" \
             "windows-dist/Mica Minecraft Launcher-${{ needs.prepare.outputs.win_version }}-user.msi"
          cp "build/packaging/machine/Mica Minecraft Launcher-${{ needs.prepare.outputs.win_version }}.msi" \
             "windows-dist/Mica Minecraft Launcher-${{ needs.prepare.outputs.win_version }}-system.msi"
          ls -la windows-dist/

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-x64
          path: windows-dist/*

  build-macos-arm:
    name: Build macOS (arm64)
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 26 (Zulu FX)
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '26'
          java-package: jdk+fx
          cache: 'maven'

      - name: Build and package (DMG)
        run: >
          mvn -B package --file pom.xml
          -Drevision=${{ needs.prepare.outputs.version }}

      # jpackage names both arch builds the same ("<name>-<ver>.dmg/.pkg"),
      # so the arm + intel jobs would collide when softprops uploads them
      # to a single GH Releases asset namespace. Stage to a flat dir with
      # an `-arm64` suffix before the extension to keep them distinct.
      - name: Stage macOS arm64 installers with arch-suffixed names
        shell: bash
        run: |
          mkdir -p macos-arm-dist
          for f in build/packaging/*.dmg; do
            base=$(basename "$f" .dmg)
            cp "$f" "macos-arm-dist/${base}-arm64.dmg"
          done
          for f in build/packaging/*.pkg; do
            base=$(basename "$f" .pkg)
            cp "$f" "macos-arm-dist/${base}-arm64.pkg"
          done
          ls -la macos-arm-dist/

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm64
          path: macos-arm-dist/*

  build-macos-intel:
    name: Build macOS (x64 Intel)
    needs: prepare
    # macos-15-intel: the macos-13 image was retired by GitHub on 2025-12-08
    # so jobs targeting it now hang queued forever. macos-15-intel is the
    # current x86_64 runner; Apple Silicon macos-latest only emits arm64.
    runs-on: macos-15-intel
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 26 (Zulu FX)
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '26'
          java-package: jdk+fx
          cache: 'maven'

      - name: Build and package (DMG)
        run: >
          mvn -B package --file pom.xml
          -Drevision=${{ needs.prepare.outputs.version }}

      # Mirror of the arm64 staging step: tag Intel outputs with `-intel`
      # so both arch DMG/PKG pairs land on the release page with distinct,
      # human-readable filenames instead of overwriting each other.
      - name: Stage macOS Intel installers with arch-suffixed names
        shell: bash
        run: |
          mkdir -p macos-intel-dist
          for f in build/packaging/*.dmg; do
            base=$(basename "$f" .dmg)
            cp "$f" "macos-intel-dist/${base}-intel.dmg"
          done
          for f in build/packaging/*.pkg; do
            base=$(basename "$f" .pkg)
            cp "$f" "macos-intel-dist/${base}-intel.pkg"
          done
          ls -la macos-intel-dist/

      - name: Upload macOS x64 artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-x64
          path: macos-intel-dist/*

  build-linux:
    name: Build Linux (x64)
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 26 (Zulu FX)
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '26'
          java-package: jdk+fx
          cache: 'maven'

      # `rpmbuild` (from the `rpm` package) is required by jpackage's RPM type
      # — it's not preinstalled on ubuntu-latest. `dpkg` and `fakeroot` are
      # already present but listed for completeness/forward-compat.
      - name: Install packaging tools
        run: sudo apt-get install -y dpkg fakeroot rpm

      # Single `mvn package` produces both DEB and RPM via the two jpackage
      # executions in the linux-packaging profile (jpackage-deb + jpackage-rpm).
      - name: Build and package (DEB + RPM)
        run: >
          mvn -B package --file pom.xml
          -Drevision=${{ needs.prepare.outputs.version }}

      # Produce a CycloneDX SBOM describing every Maven dependency that landed in
      # the build. Run only on Linux (the dependency graph is platform-independent)
      # via the sbom profile so IDE / dev `mvn package` runs don't pay the cost.
      # The SBOM ships alongside the installers so downstream packagers and
      # security scanners can audit what's inside without unzipping the JAR.
      - name: Generate dependency SBOM
        run: >
          mvn -B -P sbom org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-x64
          path: |
            build/packaging/*.deb
            build/packaging/*.rpm

      - name: Upload fat JAR (platform-independent)
        uses: actions/upload-artifact@v7
        with:
          name: fat-jar
          path: build/target/*-jar-with-dependencies.jar

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: build/target/bom.*

  # --- Step 3: Create GitHub Release ---
  release:
    name: Create Release
    needs: [prepare, build-windows, build-macos-arm, build-macos-intel, build-linux]
    runs-on: ubuntu-latest
    # Only this job needs to create / upload release assets. Other jobs in the
    # workflow run with the default contents: read declared at the top.
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Calculate hashes
        id: hashes
        run: |
          cd artifacts
          echo "## Checksums (SHA-256)" > checksums.txt
          echo '```' >> checksums.txt
          find . -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.pkg" -o -name "*.deb" -o -name "*.rpm" -o -name "*-jar-with-dependencies.jar" \) \
            -exec sha256sum {} \; | sort >> checksums.txt
          echo '```' >> checksums.txt
          cat checksums.txt
          CHECKSUMS=$(cat checksums.txt)
          echo "checksums<<EOF" >> $GITHUB_OUTPUT
          echo "$CHECKSUMS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        if: needs.prepare.outputs.is_release == 'true'
        # SHA-pinned — equivalent to tag v3 at time of pin. Bump alongside
        # Dependabot PRs (see .github/dependabot.yml).
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.version }}
          body: |
            ## Mica Minecraft Launcher ${{ needs.prepare.outputs.version }}

            ${{ steps.hashes.outputs.checksums }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.pkg
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*-jar-with-dependencies.jar

      - name: Create Pre-Release
        if: needs.prepare.outputs.is_release != 'true'
        # SHA-pinned — equivalent to tag v3 at time of pin. Bump alongside
        # Dependabot PRs (see .github/dependabot.yml).
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Pre-Release ${{ needs.prepare.outputs.version }}
          body: |
            ## Mica Minecraft Launcher ${{ needs.prepare.outputs.version }} (Pre-Release)

            > **Note:** This is a pre-release build and may not be stable. Pre-releases
            > may be removed after 90 days.

            ${{ steps.hashes.outputs.checksums }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.pkg
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*-jar-with-dependencies.jar
