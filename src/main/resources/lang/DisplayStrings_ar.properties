preview.curseforge.note=\u064A\u062A\u0637\u0644\u0628 CurseForge \u0645\u0641\u062A\u0627\u062D API \u0644\u0644\u062A\u0646\u0632\u064A\u0644\u0627\u062A \u0627\u0644\u0622\u0644\u064A\u0629\u060C \u0644\u0630\u0644\u0643 \u0644\u0627 \u064A\u0645\u0643\u0646 \u0644\u0644\u0645\u0634\u063A\u0644 \u0627\u0633\u062A\u064A\u0631\u0627\u062F \u062D\u0632\u0645\u0647 \u0645\u0628\u0627\u0634\u0631\u0629 \u0628\u0639\u062F. \u0641\u064A \u0627\u0644\u0648\u0642\u062A \u0627\u0644\u062D\u0627\u0644\u064A\u060C \u064A\u0645\u0643\u0646\u0643 \u0641\u062A\u062D \u0635\u0641\u062D\u0629 \u0627\u0644\u0645\u0634\u0631\u0648\u0639 \u0623\u062F\u0646\u0627\u0647\u060C \u0648\u062A\u0646\u0632\u064A\u0644 modpack ZIP \u0645\u0646 CurseForge\u060C \u0648\u0625\u0645\u0627 \u0625\u0639\u0627\u062F\u0629 \u062D\u0632\u0645\u0647 \u0643\u0628\u064A\u0627\u0646 Mica \u0623\u0648 \u0627\u0646\u062A\u0638\u0627\u0631 \u062A\u062D\u062F\u064A\u062B \u0627\u0644\u0645\u0634\u063A\u0644 \u0627\u0644\u062A\u0627\u0644\u064A \u0627\u0644\u0630\u064A \u064A\u0636\u064A\u0641 \u062F\u0639\u0645 \u0627\u0633\u062A\u064A\u0631\u0627\u062F CurseForge.
preview.technic.detected=\u062A\u0645 \u0627\u0643\u062A\u0634\u0627\u0641 \u0639\u0646\u0648\u0627\u0646 URL \u0627\u0644\u062E\u0627\u0635 \u0628\u0640 Technic modpack.
preview.technic.sourceLabel=\u0627\u0644\u0645\u0635\u062F\u0631: \u062A\u0643\u0646\u064A\u0643
preview.technic.note=\u062A\u062A\u0637\u0644\u0628 \u0648\u0627\u062C\u0647\u0629 \u0628\u0631\u0645\u062C\u0629 \u0627\u0644\u062A\u0637\u0628\u064A\u0642\u0627\u062A \u0627\u0644\u062E\u0627\u0635\u0629 \u0628\u0640 Technic \u0639\u0645\u064A\u0644\u0627\u064B \u0645\u0639\u062A\u0645\u062F\u064B\u0627 \u0644\u0644\u0648\u0635\u0648\u0644 \u0627\u0644\u0628\u0631\u0645\u062C\u064A\u060C \u0644\u0630\u0644\u0643 \u0644\u0627 \u064A\u0645\u0643\u0646 \u0644\u0647\u0630\u0627 \u0627\u0644\u0645\u0634\u063A\u0644 \u0627\u0633\u062A\u064A\u0631\u0627\u062F \u0627\u0644\u062D\u0632\u0645 \u0645\u0628\u0627\u0634\u0631\u0629 \u0645\u0646 \u0645\u0646\u0635\u0629 Technic \u062D\u062A\u0649 \u0627\u0644\u0622\u0646. \u0627\u0644\u062D\u0644 \u0627\u0644\u0628\u062F\u064A\u0644:
preview.technic.step1=1. \u0627\u0641\u062A\u062D \u0635\u0641\u062D\u0629 \u0627\u0644\u0645\u0634\u0631\u0648\u0639 \u0623\u062F\u0646\u0627\u0647.
preview.technic.step2=2. \u0627\u0628\u062D\u062B \u0639\u0646 \u0631\u0627\u0628\u0637 "\u062A\u0646\u0632\u064A\u0644 \u0627\u0644\u062E\u0627\u062F\u0645" \u0627\u0644\u0645\u0648\u062C\u0648\u062F \u0639\u0644\u0649 \u0635\u0641\u062D\u0629 \u0627\u0644\u062D\u0632\u0645\u0629 \u0648\u0642\u0645 \u0628\u062A\u0646\u0632\u064A\u0644 \u0627\u0644\u062E\u0627\u062F\u0645 ZIP.
preview.technic.step3=3. \u0645\u0631\u0629 \u0623\u062E\u0631\u0649 \u0641\u064A \u0647\u0630\u0627 \u0627\u0644\u0645\u0634\u063A\u0644\u060C \u0627\u0646\u0642\u0631 \u0641\u0648\u0642 "\u0627\u0633\u062A\u064A\u0631\u0627\u062F \u0645\u0644\u0641 ZIP" \u0639\u0644\u0649 \u0634\u0627\u0634\u0629 \u0627\u0644\u062A\u0635\u0641\u062D \u0648\u0627\u062E\u062A\u0631 \u0645\u0644\u0641 ZIP \u0627\u0644\u0630\u064A \u062A\u0645 \u062A\u0646\u0632\u064A\u0644\u0647. \u0633\u0648\u0641 \u064A\u062A\u0639\u0631\u0641 \u0627\u0644\u0645\u0634\u063A\u0644 \u0639\u0644\u0649 \u062A\u0646\u0633\u064A\u0642 \u062D\u0632\u0645\u0629 \u062E\u0627\u062F\u0645 Technic \u0648\u064A\u0642\u0648\u0645 \u0628\u0625\u0639\u062F\u0627\u062F\u0647 \u0644\u0643.
