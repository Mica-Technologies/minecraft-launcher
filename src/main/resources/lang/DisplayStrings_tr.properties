crash.modLoading.summaryWithClass=Bir mod "{0}" s\u0131n\u0131f\u0131n\u0131 kullanmay\u0131 denedi ancak bulunamad\u0131. Bu genellikle gerekli bir ba\u011F\u0131ml\u0131l\u0131k modunun eksik oldu\u011Fu veya farkl\u0131 bir Minecraft / Forge s\u00FCr\u00FCm\u00FCnden bir modun gizlice girdi\u011Fi anlam\u0131na gelir.
