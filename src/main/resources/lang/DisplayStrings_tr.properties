modal.advanced.removeOfficial.hint=Bu paket zaten resmi Minecraft Ba\u015Flat\u0131c\u0131s\u0131na aktar\u0131lm\u0131\u015Ft\u0131r. Buray\u0131 kald\u0131rmak, profili + d\u0131\u015Fa aktar\u0131lan oyun dizinini siler; Mika y\u00FCklemeniz etkilenmez.
modal.advanced.addOfficial.hint=Resmi Minecraft Ba\u015Flat\u0131c\u0131n\u0131zda bu paketin modlar\u0131na ve yap\u0131land\u0131rmalar\u0131na i\u015Faret eden bir profil olu\u015Fturur (vanilya versiyonlar\u0131 yaln\u0131zca profil giri\u015Fine sahiptir; kopyaya gerek yoktur). Modlu paketler, d\u0131\u015Fa aktarma s\u0131ras\u0131nda e\u015Fle\u015Fen mod y\u00FCkleyiciyi otomatik olarak kurabilir.
modal.ack.heading=Kabul edilen tarama bulgular\u0131
