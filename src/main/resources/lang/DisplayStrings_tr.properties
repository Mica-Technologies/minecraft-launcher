crash.jeiRei.summaryDual=Hem Sadece Yeterli \u00D6\u011Feler (JEI) hem de Kabaca Yeterli \u00D6\u011Feler (REI) kuruludur. Ayn\u0131 tarif g\u00F6r\u00FCnt\u00FCleme kancalar\u0131n\u0131 kaydediyorlar ve bunlardan biri her ba\u015Flatmada ba\u015Far\u0131s\u0131z oluyor. Birini se\u00E7in; modern paketlerin \u00E7o\u011Fu Fabric'te REI ve Forge'da JEI kullan\u0131r.
