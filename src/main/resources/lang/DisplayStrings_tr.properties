preview.technic.sourceLabel=Kaynak: Teknik
preview.technic.note=Technic'in API'si, programatik eri\u015Fim i\u00E7in kimli\u011Fi do\u011Frulanm\u0131\u015F bir istemci gerektirir, dolay\u0131s\u0131yla bu ba\u015Flat\u0131c\u0131, hen\u00FCz paketleri do\u011Frudan Technic Platformdan i\u00E7e aktaramaz. Ge\u00E7ici \u00E7\u00F6z\u00FCm:
preview.technic.step1=1. A\u015Fa\u011F\u0131daki proje sayfas\u0131n\u0131 a\u00E7\u0131n.
preview.technic.step2=2. Paket sayfas\u0131ndaki "Sunucu \u0130ndirme" ba\u011Flant\u0131s\u0131n\u0131 aray\u0131n ve sunucu ZIP'ini indirin.
preview.technic.step3=3. Bu ba\u015Flat\u0131c\u0131ya geri d\u00F6nd\u00FC\u011F\u00FCn\u00FCzde, g\u00F6z atma ekran\u0131nda "ZIP'i \u0130\u00E7e Aktar" se\u00E7ene\u011Fini t\u0131klay\u0131n ve indirilen ZIP'i se\u00E7in. Ba\u015Flat\u0131c\u0131, Technic sunucu paketi format\u0131n\u0131 tan\u0131yacak ve sizin i\u00E7in ayarlayacakt\u0131r.
