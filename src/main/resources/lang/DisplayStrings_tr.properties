crash.diskFull.summary=Lansman\u0131n ortas\u0131nda sistemin disk alan\u0131 t\u00FCkendi. Biraz yer a\u00E7\u0131n \u2014 mod paketi d\u00FCnyalar\u0131, eski ekran g\u00F6r\u00FCnt\u00FCleri ve paketin y\u00FCkleme klas\u00F6r\u00FC alt\u0131ndaki kilitlenme raporlar\u0131 genellikle en b\u00FCy\u00FCk su\u00E7lulard\u0131r \u2014 ve tekrar deneyin.
crash.diskFull.title=Disk dolu
crash.fileLock.summary=Oyunun yazmaya \u00E7al\u0131\u015Ft\u0131\u011F\u0131 bir dosya ba\u015Fka bir i\u015Flem taraf\u0131ndan kilitlendi. Windows'ta bu, neredeyse her zaman indirilen modu veya \u00E7al\u0131\u015Fma zaman\u0131n\u0131 tarayan bir antivir\u00FCs (veya Windows Defender) i\u015Flemidir; ba\u015Flat\u0131c\u0131n\u0131n y\u00FCkleme klas\u00F6r\u00FCn\u00FC beyaz listeye almay\u0131 deneyin ve ard\u0131ndan ba\u015Flatmay\u0131 yeniden deneyin. Y\u00FCkleme klas\u00F6r\u00FCne i\u015Faret eden OneDrive / senkronizasyon istemcilerinin kapat\u0131lmas\u0131 di\u011Fer yayg\u0131n \u00E7\u00F6z\u00FCmd\u00FCr.
