modal.advanced.scanFreq.label=G\u00FCvenlik tarama s\u0131kl\u0131\u011F\u0131
modal.advanced.scanFreq.hint=Bu paketi ba\u015Flatmadan \u00F6nce k\u00F6t\u00FC ama\u00E7l\u0131 yaz\u0131l\u0131m taramas\u0131n\u0131n ne s\u0131kl\u0131kla \u00E7al\u0131\u015Ft\u0131r\u0131laca\u011F\u0131. "Genel varsay\u0131lan\u0131 kullan", Ayarlar \u2192 Geli\u015Fmi\u015F'te belirledi\u011Finiz ayarlara uyar. Yaln\u0131zca kayna\u011Fa g\u00FCveniyorsan\u0131z devre d\u0131\u015F\u0131 b\u0131rak\u0131n; tarama, ba\u015Flat\u0131c\u0131n\u0131n tahrif edilmi\u015F modlara kar\u015F\u0131 son savunma hatt\u0131d\u0131r.
modal.advanced.verifyNow=Bu paketi \u015Fimdi do\u011Frulay\u0131n
