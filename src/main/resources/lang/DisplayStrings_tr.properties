settings.fxml.solidSingleSteady=Kat\u0131: tek sabit renk. Nefes al: yava\u015F yava\u015F girip \u00E7\u0131k (varsay\u0131lan). Darbe: Vurgu ve tamamlay\u0131c\u0131s\u0131 aras\u0131nda daha h\u0131zl\u0131 darbe. D\u00F6ng\u00FC: 3-4 renk aras\u0131nda yumu\u015Fak d\u00F6ng\u00FC \u2014 bir paket odaktayken modpack logosundan \u00F6rneklenir, aksi takdirde tema vurgusunun etraf\u0131ndaki benzer tonlar. G\u00F6kku\u015Fa\u011F\u0131: T\u00FCm spektrum boyunca s\u00FCrekli renk taramas\u0131, paket ba\u011F\u0131ml\u0131l\u0131\u011F\u0131 yok.
settings.fxml.inGameEffects=Oyun \u0130\u00E7i Efektler
settings.fxml.useModpackColors=Modpack renklerini kullan
settings.fxml.lightUpThe=Klavyeyi, \u00E7al\u0131\u015Fan mod paketinin logosundan \u00F6rneklenen renklerle ayd\u0131nlat\u0131n. Kapal\u0131yken efektler ba\u015Flat\u0131c\u0131 temas\u0131n\u0131n vurgu paletini kullan\u0131r.
settings.fxml.highlightMinecraftKeys=Minecraft anahtarlar\u0131n\u0131 vurgulay\u0131n
settings.fxml.overlayWasdE=WASD / E / Q / F / Space / Shift / Ctrl'yi modpack renkli arka plan \u00FCzerinde kontrast olu\u015Fturan bir vurguyla kaplay\u0131n, b\u00F6ylece oyun tu\u015Flar\u0131 bir bak\u0131\u015Fta g\u00F6ze \u00E7arps\u0131n.
settings.fxml.test=Test
settings.fxml.flashesSolidMagenta=Ba\u011Fl\u0131 her cihazda 2 saniye boyunca sabit macenta renginde (RGB 255, 0, 255) yan\u0131p s\u00F6ner, ard\u0131ndan \u00F6nceki efekti geri y\u00FCkler. Sabit, tam parlakl\u0131kta bir fla\u015F, arka ucun donan\u0131m\u0131n\u0131za ula\u015Ft\u0131\u011F\u0131n\u0131 do\u011Frular. Razer Chroma i\u00E7in not: Chroma Connect, \u00E7er\u00E7eveleri yaln\u0131zca birincil bir Razer cihaz\u0131 (klavye, fare veya fare altl\u0131\u011F\u0131) da ba\u011Fland\u0131\u011F\u0131nda \u00FC\u00E7\u00FCnc\u00FC taraf cihazlara (kasa fanlar\u0131, \u015Feritler vb.) iletir. Yaln\u0131zca bu \u00FC\u00E7\u00FCnc\u00FC taraf cihazlar titriyorsa veya karanl\u0131k kal\u0131yorsa bir Razer klavye/fare tak\u0131n ve yeniden deneyin. Birincil cihaz\u0131n mevcut oldu\u011Fu titreme, genellikle ba\u015Fka bir RGB uygulamas\u0131n\u0131n (Synapse, iCUE, Signal RGB) cihaz i\u00E7in m\u00FCcadele etti\u011Fi anlam\u0131na gelir.
