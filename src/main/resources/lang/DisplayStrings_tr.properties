crash.auth.summary=Oyun, ba\u015Flat\u0131c\u0131n\u0131n sa\u011Flad\u0131\u011F\u0131 oturum jetonunu reddetti. Genellikle kaydedilen oturum a\u00E7ma bilgilerinin s\u00FCresi dolmu\u015Ftur; Ba\u015Flat\u0131c\u0131dan \u00E7\u0131k\u0131\u015F yap\u0131p tekrar oturum a\u00E7mak sorunu temizler.
