preview.technic.step2=2. Zoek naar de link "Server Download" op de pakketpagina en download de server-ZIP.
preview.technic.step3=3. Terug in dit opstartprogramma klikt u op "ZIP importeren" in het bladerscherm en kiest u de gedownloade ZIP. Het opstartprogramma herkent het Technic-serverpakketformaat en stelt het voor u in.
