settings.fxml.turnOffThe=Schakel de integraties uit waarvan u niet wilt dat het opstartprogramma deze bereikt, zelfs als hun software is ge\u00EFnstalleerd. Standaard uitgeschakeld voor Chroma REST, aangezien de native SDK deze vervangt bij elke werkende Synapse-installatie.
settings.fxml.menuEffect=Menu-effect
settings.fxml.lightUpDevices=Verlicht apparaten in menu's
settings.fxml.whenOnYour=Als dit is ingeschakeld, lichten uw apparaten op terwijl u zich in de opstartmenu's bevindt, met behulp van de accentkleur van het actieve thema. Als u de detailweergave van een modpack opent, wordt overgeschakeld naar de gesamplede kleuren van dat modpack. Wanneer uitgeschakeld, blijven apparaten donker tussen gamelanceringen.
settings.fxml.animationStyle=Animatiestijl
settings.fxml.solidSingleSteady=Effen: enkele vaste kleur. Ademhalen: langzaam in- en uitfaden (standaard). Puls: snellere puls tussen het accent en zijn complement. Cyclus: vloeiende lus door 3-4 kleuren \u2013 gesampled uit het modpack-logo wanneer een pakket in focus is, anders analoge tinten rond het thema-accent. Regenboog: continue kleurtoon over het volledige spectrum, geen pakketafhankelijkheid.
settings.fxml.inGameEffects=In-game-effecten
settings.fxml.useModpackColors=Gebruik modpack-kleuren
settings.fxml.lightUpThe=Verlicht het toetsenbord in kleuren die zijn gesampled uit het actieve modpack-logo. Wanneer uitgeschakeld, gebruiken effecten het accentpalet van het opstartthema.
settings.fxml.highlightMinecraftKeys=Markeer Minecraft-sleutels
settings.fxml.overlayWasdE=Overlay WASD / E / Q / F / Space / Shift / Ctrl met een contrasterend accent over de modpack-kleurachtergrond, zodat de gameplay-toetsen in \u00E9\u00E9n oogopslag opvallen.
settings.fxml.test=Test
settings.fxml.flashesSolidMagenta=Knippert continu magenta (RGB 255, 0, 255) op elk aangesloten apparaat gedurende 2 seconden en herstelt vervolgens het eerdere effect. Een constante flits met volledige helderheid bevestigt dat de backend uw hardware bereikt. Opmerking voor Razer Chroma: Chroma Connect stuurt frames alleen door naar apparaten van derden (behuizingsventilatoren, strips, enz.) wanneer er ook een primair Razer-apparaat (toetsenbord, muis of muismat) is aangesloten. Als alleen die apparaten van derden flikkeren of donker blijven, sluit dan een Razer-toetsenbord/muis aan en probeer het opnieuw. Flikkering terwijl er een primair apparaat aanwezig is, betekent meestal dat een andere RGB-app (Synapse, iCUE, Signal RGB) om het apparaat vecht.
