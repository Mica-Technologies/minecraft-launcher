crash.action.searchWeb=Zoek op internet
crash.audio.summary=Minecraft kan het audiosubsysteem niet initialiseren. Op Linux is dit meestal een PulseAudio \u2194 ALSA-mismatch (vooral in containers of nieuwe installaties); op Windows is het doorgaans een uitgeschakeld/losgekoppeld uitvoerapparaat. Muziek en geluiden kunnen als tijdelijke oplossing ook in de game worden uitgeschakeld.
crash.audio.title=Audio-initialisatie is mislukt
crash.auth.summary=De game heeft de sessietoken afgewezen die door de launcher werd geleverd. Meestal is de opgeslagen login verlopen; Door u af te melden bij het opstartprogramma en opnieuw aan te melden, wordt het probleem opgelost.
crash.auth.title=Minecraft kan niet verifi\u00EBren
crash.diskFull.summary=Het systeem had halverwege de lancering geen schijfruimte meer. Maak wat ruimte vrij \u2013 modpack-werelden, oude schermafbeeldingen en crashrapporten onder de installatiemap van het pakket zijn meestal de grootste overtreders \u2013 en probeer het opnieuw.
crash.diskFull.title=Schijf vol
crash.fileLock.summary=Een bestand dat de game probeerde te schrijven, werd vergrendeld door een ander proces. Op Windows is dit bijna altijd een antivirusprogramma (of Windows Defender) dat de gedownloade mod of runtime scant. Probeer de installatiemap van het opstartprogramma op de witte lijst te zetten en probeer het vervolgens opnieuw te starten. Het sluiten van OneDrive/synchronisatieclients die naar de installatiemap verwijzen, is de andere veel voorkomende oplossing.
crash.fileLock.title=Bestand vergrendeld door een ander proces
crash.forgeDep.summary=Mod "{0}" moet {1} {2} ge\u00EFnstalleerd hebben, maar er is geen compatibele versie geladen. Voeg de ontbrekende afhankelijkheid toe, update de bestaande naar een overeenkomende versie of verwijder de mod die dit vereist.
crash.forgeDep.title=Ontbrekende of niet-overeenkomende mod-afhankelijkheid
crash.gpu.summary=Minecraft kan de grafische laag niet initialiseren. De gebruikelijke oorzaken zijn verouderde GPU-stuurprogramma's, het kiezen van de verkeerde GPU op een laptop met zowel ge\u00EFntegreerde als afzonderlijke grafische kaarten, of sessies op een extern bureaublad waarbij OpenGL niet wordt versneld.
crash.gpu.title=Grafische initialisatie is mislukt
crash.javaVersion.manifestSuffix=De vereiste Java-versie wordt normaal gesproken gedeclareerd door het modpack-manifest.
crash.javaVersion.summary=Een mod of bibliotheek in dit pakket is gecompileerd voor een nieuwere Java-versie dan de runtime die momenteel wordt gebruikt{0}. Het runtimebeheerscherm van het opstartprogramma kan een ander Java installeren of kiezen.{1}
crash.javaVersion.targetSuffix=(deze mod richt zich op Java {0})
crash.javaVersion.title=Java-versie komt niet overeen
crash.jeiRei.summaryCollision=Een recept-ID botste tussen twee mods - meestal wanneer twee mods dezelfde recept-ID registreren, of wanneer een receptbeheermod (JEI / REI / CraftTweaker) recepten sneller laadt dan de onderliggende mods ze publiceren. Als u een van de receptbeheermods verwijdert, wordt de lancering doorgaans gedeblokkeerd.
crash.jeiRei.summaryDual=Zowel Just Enough Items (JEI) als Roughly Enough Items (REI) zijn ge\u00EFnstalleerd. Ze registreren dezelfde receptenviewer-hooks en een ervan mislukt bij elke lancering. Kies er \u00E9\u00E9n: de meeste moderne pakketten gebruiken REI op Fabric en JEI op Forge.
crash.jeiRei.titleCollision=Botsing met recept-ID
crash.jeiRei.titleDual=JEI- en REI-conflict
crash.mixin.culpritSuffix=\u2014 mix van "{0}" lijkt de boosdoener te zijn
crash.mixin.summary=De mix-patch van een mod kon niet worden toegepast{0}. Dit betekent meestal dat twee mods dezelfde klasse proberen te patchen, of dat een van hen deze Minecraft-versie nog niet ondersteunt.
crash.mixin.title=Mod mixin-conflict
crash.modLoading.summaryGeneric=Forge kan de mods van dit pakket niet netjes laden. De meest voorkomende oorzaken zijn een ontbrekende afhankelijkheid, een mod die zich richt op een andere Minecraft/Forge-versie, of twee mods die niet met elkaar overweg kunnen.
crash.modLoading.summaryWithClass=Een mod probeerde klasse "{0}" te gebruiken, maar deze werd niet gevonden. Dat betekent meestal dat een vereiste afhankelijkheidsmod ontbreekt of dat een mod uit een andere Minecraft / Forge-versie is binnengeslopen.
crash.modLoading.title=Mod laden mislukt
crash.modMcMismatch.summary=Er is een mod in dit pakket gebouwd voor Minecraft {0}, maar het pakket lanceert Minecraft {1}. Downgrade de Minecraft-versie van het pakket, ruil de mod voor een versie die is gebouwd voor {1}, of verwijder deze.
crash.modMcMismatch.title=Mod gebouwd voor Minecraft {0}, pakketuitvoeringen {1}
crash.nativeLib.summary=De JVM kon een van de eigen bibliotheken van Minecraft niet laden (meestal LWJGL of een JNI-binding). De gebruikelijke oorzaken zijn een antivirusprogramma dat het bestand in quarantaine plaatst, een beschadigde installatie of (op Linux) een ontbrekende systeembibliotheek. Het opnieuw installeren van het modpack lost het meestal op.
crash.nativeLib.title=Kan een native bibliotheek niet laden
crash.oom.detailSuffix=({0})
crash.oom.increaseRam=Verhoog het maximale RAM-geheugen naar {0} GB
crash.oom.openRamSettings=Open RAM-instellingen
crash.oom.summary=Minecraft heeft onvoldoende geheugen{0}. Het maximale RAM-geheugen van uw opstartprogramma is momenteel {1} GB; dit pakket heeft meer nodig.
crash.oom.systemTotal=Uw systeem heeft in totaal ongeveer {0} GB.
crash.oom.title=Geen geheugen meer
crash.optifineSodium.summary=Zowel OptiFine als Natrium zijn ge\u00EFnstalleerd. Ze patchen dezelfde Minecraft-rendering-internals op incompatibele manieren en kunnen niet veilig naast elkaar bestaan \u200B\u200B\u2013 kies er \u00E9\u00E9n. Natrium heeft de stoffenlader nodig; OptiFine werkt op Forge of met de OptiFabric bridge. Met de knoppen Uitschakelen hieronder wordt de naam van een van de twee potten gewijzigd in {name}.jar.disabled, zodat de lader deze bij de volgende keer opstarten overslaat.
crash.optifineSodium.title=OptiFine en Natrium zijn onverenigbaar
crash.unknown.summary=We konden geen specifieke oorzaak uit het crashrapport identificeren. Afsluitcode {0}. Bekijk het volledige rapport hieronder voor meer informatie; de regel die begint met "Veroorzaakt door:" is meestal het handigste startpunt.
crash.unknown.title=Minecraft is gecrasht
crash.world.summary=Minecraft verslikte zich in een opslagbestand: een deel, regio of level.dat is onleesbaar. Veelvoorkomende oorzaken: een onverwachte herstart tijdens een eerdere opslag, twee mods die conflicterende NBT schrijven, of een mod die tussen sessies is verwijderd waarvan de gegevens nog op schijf staan. Probeer een andere wereld te laden of herstel vanaf een recente back-up.
crash.world.title=Wereldgegevens konden niet worden gelezen
