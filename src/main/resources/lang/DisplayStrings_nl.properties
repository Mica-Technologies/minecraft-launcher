preview.curseforge.note=CurseForge vereist een API-sleutel voor programmatische downloads, dus het opstartprogramma kan hun pakketten nog niet rechtstreeks importeren. Voorlopig kun je de onderstaande projectpagina openen, de modpack ZIP downloaden van CurseForge en deze opnieuw verpakken als een Mica-manifest of wachten op de volgende launcher-update die CurseForge-importondersteuning toevoegt.
