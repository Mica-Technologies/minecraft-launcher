modal.advanced.hint=Bediening per pakket voor krachtige gebruikers. Standaardinstellingen zijn voor de meeste gebruikers prima.
modal.advanced.alwaysVerify=Controleer altijd de gamebestanden bij het opstarten
modal.advanced.alwaysVerify.hint=Als het opstartprogramma is uitgeschakeld (standaard), slaat het het opnieuw hashen van bestanden over die niet zijn gewijzigd sinds de laatste succesvolle verificatie, waardoor daaropvolgende lanceringen merkbaar sneller gaan. Schakel dit in als u problemen heeft gehad met beschadigde bestanden of als u elke keer een strenge integriteitscontrole wilt.
modal.advanced.scanFreq.label=Frequentie van beveiligingsscans
modal.advanced.scanFreq.hint=Hoe vaak de malwarescan moet worden uitgevoerd voordat dit pakket wordt gestart. "Gebruik globale standaard" volgt wat u heeft ingesteld in Instellingen \u2192 Geavanceerd. Schakel dit alleen uit als u de bron vertrouwt. De scan is de laatste verdedigingslinie van het opstartprogramma tegen gemanipuleerde mods.
modal.advanced.verifyNow=Controleer dit pakket nu
modal.advanced.verifyNow.hint=Herhasht elke mod, bibliotheek en asset opnieuw ten opzichte van het manifest van het pakket. Repareert alles wat beschadigd is. Afhankelijk van de verpakkingsgrootte duurt het enkele seconden tot enkele minuten.
modal.advanced.removeOfficial.hint=Dit pakket is al ge\u00EBxporteerd naar de offici\u00EBle Minecraft Launcher. Als u hier verwijdert, wordt het profiel + de ge\u00EBxporteerde spelmap verwijderd; uw Mica-installatie wordt niet be\u00EFnvloed.
modal.advanced.addOfficial.hint=Cre\u00EBert een profiel in je offici\u00EBle Minecraft Launcher dat verwijst naar de mods en configuraties van dit pakket (vanilleversies krijgen alleen toegang tot het profiel - geen kopie nodig). Gemodificeerde pakketten kunnen de bijpassende modloader automatisch installeren tijdens het exporteren.
modal.ack.heading=Erkende scanbevindingen
modal.ack.intro=De pakketbeheerder heeft deze specifieke scanbevindingen gemarkeerd als bekend-OK, zodat het opstartprogramma ze niet blokkeert. De scan wordt nog steeds voor elk bestand uitgevoerd - alleen de vermelde combinaties (bestand + regel + locatie) worden stilgezet, en een mod-update die de inhoud van het bestand verandert, maakt de invoer automatisch ongeldig.
