preview.curseforge.note=CurseForge\uC5D0\uB294 \uD504\uB85C\uADF8\uB798\uBC0D \uBC29\uC2DD \uB2E4\uC6B4\uB85C\uB4DC\uB97C \uC704\uD55C API \uD0A4\uAC00 \uD544\uC694\uD558\uBBC0\uB85C \uB7F0\uCC98\uB294 \uC544\uC9C1 \uD329\uC744 \uC9C1\uC811 \uAC00\uC838\uC62C \uC218 \uC5C6\uC2B5\uB2C8\uB2E4. \uC9C0\uAE08\uC740 \uC544\uB798 \uD504\uB85C\uC81D\uD2B8 \uD398\uC774\uC9C0\uB97C \uC5F4\uACE0 CurseForge\uC5D0\uC11C modpack ZIP\uC744 \uB2E4\uC6B4\uB85C\uB4DC\uD55C \uD6C4 Mica \uB9E4\uB2C8\uD398\uC2A4\uD2B8\uB85C \uB2E4\uC2DC \uD328\uD0A4\uC9D5\uD558\uAC70\uB098 CurseForge \uAC00\uC838\uC624\uAE30 \uC9C0\uC6D0\uC744 \uCD94\uAC00\uD558\uB294 \uB2E4\uC74C \uB7F0\uCC98 \uC5C5\uB370\uC774\uD2B8\uB97C \uAE30\uB2E4\uB9B4 \uC218 \uC788\uC2B5\uB2C8\uB2E4.
