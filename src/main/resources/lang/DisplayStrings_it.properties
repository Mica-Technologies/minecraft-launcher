settings.fxml.whenLwjglArm=Quando l'applicazione delle patch ARM LWJGL \u00E8 abilitata, il programma di avvio sostituisce i nativi x86_64 LWJGL2 e jinput forniti con Minecraft 1.12.2 e versioni precedenti con i binari ARM64 creati dalla community. Grazie ai manutentori di questi progetti:
