modal.advanced.hint=Controlli per utenti esperti per confezione. Le impostazioni predefinite vanno bene per la maggior parte degli utenti.
modal.advanced.alwaysVerify=Verifica sempre i file di gioco all'avvio
modal.advanced.alwaysVerify.hint=Quando \u00E8 disattivato (impostazione predefinita), il programma di avvio salta il re-hashing dei file che non sono cambiati dall'ultima verifica riuscita, rendendo i lanci successivi notevolmente pi\u00F9 veloci. Attivala se hai riscontrato problemi con file danneggiati o desideri che venga eseguito ogni volta un rigoroso controllo dell'integrit\u00E0.
modal.advanced.scanFreq.label=Frequenza della scansione di sicurezza
modal.advanced.scanFreq.hint=La frequenza con cui eseguire la scansione del malware prima di avviare questo pacchetto. "Utilizza impostazione predefinita globale" segue ci\u00F2 che hai impostato in Impostazioni \u2192 Avanzate. Disabilita solo se ti fidi della fonte: la scansione \u00E8 l'ultima linea di difesa del launcher contro le mod manomesse.
modal.advanced.verifyNow=Verifica questo pacchetto adesso
modal.advanced.verifyNow.hint=Rielabora ogni mod, libreria e risorsa rispetto al manifest del pacchetto. Ripara tutto ci\u00F2 che \u00E8 danneggiato. Richiede da pochi secondi a un paio di minuti a seconda delle dimensioni della confezione.
modal.advanced.removeOfficial.hint=Questo pacchetto \u00E8 gi\u00E0 esportato nel Launcher ufficiale di Minecraft. Rimuovendo qui si elimina il profilo + la directory del gioco esportato; la tua installazione di Mica non sar\u00E0 influenzata.
modal.advanced.addOfficial.hint=Crea un profilo nel tuo launcher ufficiale di Minecraft che punta alle mod e alle configurazioni di questo pacchetto (le versioni vanilla ottengono una voce solo per il profilo, non \u00E8 necessaria alcuna copia). I pacchetti modificati possono installare automaticamente il modloader corrispondente durante l'esportazione.
modal.ack.heading=Risultati della scansione riconosciuti
modal.ack.intro=Il manutentore del pacchetto ha contrassegnato questi risultati specifici della scansione come noti-OK in modo che il programma di avvio non li blocchi. La scansione viene comunque eseguita su ogni file: solo le combinazioni elencate (file + regola + posizione) vengono silenziate e un aggiornamento della mod che modifica il contenuto del file invalida automaticamente la voce.
