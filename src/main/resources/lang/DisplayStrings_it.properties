settings.fxml.fullLicenseTexts=I testi completi della licenza vengono forniti con il launcher installato nella cartella LICENSES e sono disponibili nel repository dei sorgenti di questo progetto.
settings.fxml.javaRuntimes=Runtime Java
settings.fxml.modernMinecraftVersions=Le versioni moderne di Minecraft utilizzano le distribuzioni runtime Java ufficiali di Mojang. Legacy Forge (Minecraft 1.12.2 e versioni precedenti) utilizza Bell-SW Liberica JRE 8 per compatibilit\u00E0.
