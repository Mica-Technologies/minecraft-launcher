settings.fxml.whenOnModpack=Quando sono attivi, il modpack e le schede della versione nel menu principale e nella vista Sfoglia mostrano l'immagine di sfondo del pacchetto sopra il gradiente procedurale. Quando \u00E8 disattivata, viene mostrata solo la sfumatura per un aspetto pi\u00F9 pulito e uniforme.
