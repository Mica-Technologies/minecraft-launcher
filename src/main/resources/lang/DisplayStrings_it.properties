settings.fxml.minecraftTrademark=Marchio di Minecraft
settings.fxml.minecraftIsA=Minecraft \u00E8 un marchio di Mojang Synergies AB e Microsoft Corporation. Questo launcher utilizza il nome Minecraft esclusivamente per identificare il gioco che avvia e non \u00E8 affiliato, approvato, sponsorizzato o specificamente approvato da Mojang AB o Microsoft.
