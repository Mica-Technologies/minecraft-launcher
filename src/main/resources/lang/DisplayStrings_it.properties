officialExport.installLoader.body=Adesso il programma di avvio pu\u00F2 eseguire il programma di installazione di {0} per te, quindi il profilo funziona al primo avvio. Di solito sono necessari 10-30 secondi.\\n\\nVersione da installare: {1}\\n\\nIn alternativa, puoi aggiungere il profilo senza installarlo: verr\u00E0 visualizzato come "Versione non trovata" nel Launcher di Minecraft finch\u00E9 non esegui manualmente il programma di installazione di {0}.
