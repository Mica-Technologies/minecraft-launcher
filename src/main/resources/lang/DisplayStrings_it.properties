officialExport.notInstalled.title=Launcher di Minecraft non trovato
officialExport.notInstalled.body=Il programma di avvio non \u00E8 riuscito a trovare la cartella dei dati del programma di avvio di Minecraft ({0}). Installa Minecraft Launcher (ed eseguilo almeno una volta) prima di esportare.
officialExport.success.title=Aggiunto al launcher di Minecraft
