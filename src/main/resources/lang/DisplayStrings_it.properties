settings.fxml.showWhatYou=Mostra a cosa stai giocando sul tuo profilo Discord. Richiede che l'app desktop Discord sia in esecuzione sullo stesso computer: il programma di avvio comunica con essa localmente tramite IPC, non \u00E8 richiesto alcun token o accesso.
settings.fxml.friendInvites=Inviti di amici
settings.fxml.allowDiscordInvites=Consenti inviti Discord
settings.fxml.whenEnabledFriends=Se abilitato, gli amici che vedono il tuo stato Discord mentre sei nel gioco ricevono un messaggio &quot;Partecipa al gioco&quot; pulsante sul tuo profilo che si installa automaticamente e avvia lo stesso modpack sul loro computer. Disabilita solo il pulsante di partecipazione: la ricca presenza stessa \u00E8 controllata dall'interruttore in alto.
settings.fxml.youCanAlso=Puoi anche fare clic con il pulsante destro del mouse su qualsiasi scheda modpack nel menu principale e selezionare &quot;Copia collegamento di invito a Discord&quot; per condividere l'URL di partecipazione direttamente in qualsiasi chat.
settings.fxml.rgbLighting=Illuminazione RGB
settings.fxml.lightingBackend=Backend di illuminazione
settings.fxml.enableRgbLighting=Abilita l'illuminazione RGB
settings.fxml.whenEnabledThe=Se abilitato, il programma di avvio illumina la tastiera supportata con colori derivati \u200B\u200Bdal modpack durante il gioco. Disattivato per impostazione predefinita: attivalo solo quando desideri che il programma di avvio comunichi con i tuoi dispositivi periferici.
settings.fxml.backend=Backend:
settings.fxml.disabled=Disabilitata
settings.fxml.autoRunsEvery=Esegue automaticamente tutti i backend abilitati di seguito che dispongono di hardware disponibile, quindi un impianto misto (ad esempio ventole Razer + una tastiera con illuminazione dinamica di Windows) illumina tutto in una volta. Scegli invece un backend specifico per forzare solo quello.
settings.fxml.autoModeIntegrations=Integrazioni in modalit\u00E0 automatica:
settings.fxml.openrgb=OpenRGB
settings.fxml.razerChromaNative=Razer Chroma (SDK nativo)
settings.fxml.windowsDynamicLighting=Illuminazione dinamica di Windows
settings.fxml.corsairIcue=Corsair iCUE
settings.fxml.asusAuraLegacy=ASUS Aura (SDK precedente)
settings.fxml.razerChromaRest=Razer Chroma (REST \u2014 precedente)
settings.fxml.turnOffThe=Disattiva le integrazioni che non vuoi che il launcher raggiunga, anche se il relativo software \u00E8 installato. Disattivato per impostazione predefinita per Chroma REST poich\u00E9 l'SDK nativo lo sostituisce su qualsiasi installazione Synapse funzionante.
settings.fxml.menuEffect=Effetto del menu
settings.fxml.lightUpDevices=Illumina i dispositivi nei menu
settings.fxml.whenOnYour=Quando \u00E8 attivo, i tuoi dispositivi si illuminano mentre ti trovi nei menu di avvio, utilizzando il colore principale del tema attivo. Aprendo la visualizzazione dei dettagli di un modpack si passa ai colori campionati di quel modpack. Quando sono spenti, i dispositivi rimangono spenti tra l'avvio del gioco e l'altro.
settings.fxml.animationStyle=Stile di animazione
settings.fxml.solidSingleSteady=Solido: singolo colore fisso. Respira: dissolvenza lenta in entrata e in uscita (impostazione predefinita). Polso: polso pi\u00F9 veloce tra l'accento e il suo complemento. Ciclo: ciclo fluido attraverso 3-4 colori: campionati dal logo modpack quando un pacchetto \u00E8 a fuoco, altrimenti tonalit\u00E0 analoghe attorno all'accento del tema. Arcobaleno: la tonalit\u00E0 continua abbraccia l'intero spettro, nessuna dipendenza dal pacchetto.
settings.fxml.inGameEffects=Effetti di gioco
settings.fxml.useModpackColors=Usa i colori del modpack
settings.fxml.lightUpThe=Illumina la tastiera con i colori campionati dal logo del modpack in esecuzione. Quando sono disattivati, gli effetti utilizzano la tavolozza degli accenti del tema di avvio.
settings.fxml.highlightMinecraftKeys=Evidenzia le chiavi di Minecraft
settings.fxml.overlayWasdE=Sovrapponi WASD / E / Q / F / Spazio / Maiusc / Ctrl con un accento contrastante sullo sfondo colorato del modpack, in modo che i tasti di gioco risaltino a colpo d'occhio.
settings.fxml.test=Test
settings.fxml.flashesSolidMagenta=Lampeggia in magenta fisso (RGB 255, 0, 255) su ogni dispositivo collegato per 2 secondi, quindi ripristina l'effetto precedente. Un flash costante e a piena luminosit\u00E0 conferma che il backend sta raggiungendo l'hardware. Nota per Razer Chroma: Chroma Connect inoltra i fotogrammi a dispositivi di terze parti (ventole del case, strisce, ecc.) solo quando \u00E8 collegato anche un dispositivo Razer primario (tastiera, mouse o tappetino per mouse). Se solo i dispositivi di terze parti sfarfallano o rimangono spenti, collega una tastiera/mouse Razer e riprova. Lo sfarfallio con un dispositivo primario presente di solito significa che un'altra app RGB (Synapse, iCUE, Signal RGB) sta lottando per il dispositivo.
