preview.technic.note=L'API di Technic richiede un client autenticato per l'accesso programmatico, quindi questo launcher non pu\u00F2 ancora importare pacchetti direttamente dalla piattaforma Technic. La soluzione alternativa:
preview.technic.step1=1. Apri la pagina del progetto qui sotto.
preview.technic.step2=2. Cerca il collegamento "Download del server" nella pagina del pacchetto e scarica lo ZIP del server.
preview.technic.step3=3. Tornando al launcher, fai clic su "Importa ZIP" nella schermata di navigazione e seleziona lo ZIP scaricato. Il programma di avvio riconoscer\u00E0 il formato del pacchetto server Technic e lo configurer\u00E0 per te.
