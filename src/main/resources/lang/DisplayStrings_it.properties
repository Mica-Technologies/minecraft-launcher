officialExport.confirm.body=Il programma di avvio creer\u00E0 un profilo chiamato "{0} (Mica)" che punta a una directory di gioco gestita da Mica contenente le mod e le configurazioni di questo pacchetto. Potrai quindi giocare a questo pacchetto dal launcher di Minecraft.\\n\\nID versione: {1}\\n\\n{2}
officialExport.confirm.body.modded.loaderInstalled=La versione del modloader corrispondente \u00E8 gi\u00E0 installata nel tuo Minecraft Launcher, quindi il profilo funzioner\u00E0 immediatamente.
officialExport.confirm.body.modded.loaderMissing=Attenzione: la versione del modloader corrispondente ({1}) non \u00E8 ancora installata nel tuo Minecraft Launcher. Il profilo verr\u00E0 visualizzato con un avviso "Versione non trovata" finch\u00E9 non eseguirai il programma di installazione {0} per registrarlo.
officialExport.confirm.body.vanilla=Versione Vanilla: non \u00E8 necessario copiare alcuna mod. Il profilo \u00E8 solo un puntatore a Minecraft {1}, che il launcher di Minecraft sa gi\u00E0 come eseguire.
