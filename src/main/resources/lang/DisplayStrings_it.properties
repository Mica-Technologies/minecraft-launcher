quickStart.welcome.heading=Benvenuto nel launcher di Mica Minecraft
quickStart.welcome.subtitle=Una configurazione rapida in modo che il launcher sia perfetto fin dalla prima sessione. Scegli un tema, ottimizza l'allocazione della memoria e attiva un paio di preferenze, che potrai modificare in seguito in Impostazioni.
quickStart.welcome.hint=Fare clic su Avanti per iniziare. Puoi anche saltare: il programma di avvio inizier\u00E0 con impostazioni predefinite sensate e potrai configurare le cose da Impostazioni ogni volta che lo desideri.
