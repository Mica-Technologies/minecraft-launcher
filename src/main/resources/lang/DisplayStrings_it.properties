crash.action.searchWeb=Cerca sul web
crash.audio.summary=Minecraft non \u00E8 riuscito a inizializzare il sottosistema audio. Su Linux si tratta solitamente di una mancata corrispondenza PulseAudio \u2194 ALSA (specialmente nei contenitori o nelle nuove installazioni); su Windows \u00E8 in genere un dispositivo di output disabilitato/disconnesso. Musica e suoni possono anche essere disattivati \u200B\u200Bnel gioco come soluzione alternativa.
crash.audio.title=L'inizializzazione dell'audio non \u00E8 riuscita
crash.auth.summary=Il gioco ha rifiutato il token di sessione fornito dal launcher. Di solito il login salvato \u00E8 scaduto; uscire dal programma di avvio e accedere nuovamente cancella il problema.
crash.auth.title=Minecraft non \u00E8 riuscito ad autenticarsi
crash.diskFull.summary=Il sistema ha esaurito lo spazio su disco durante il lancio. Libera un po' di spazio (i mondi modpack, i vecchi screenshot e i rapporti sugli arresti anomali nella cartella di installazione del pacchetto sono solitamente i maggiori trasgressori) e riprova.
crash.diskFull.title=Disco pieno
crash.fileLock.summary=Un file che il gioco ha tentato di scrivere \u00E8 stato bloccato da un altro processo. Su Windows si tratta quasi sempre di un antivirus (o Windows Defender) che esegue la scansione della mod o del runtime scaricato: prova a inserire nella whitelist la cartella di installazione del programma di avvio, quindi riprova ad avviare. La chiusura dei client OneDrive/sincronizzazione puntati sulla cartella di installazione \u00E8 l'altra soluzione comune.
crash.fileLock.title=File bloccato da un altro processo
crash.forgeDep.summary=La mod "{0}" necessita di {1} {2} installato, ma non \u00E8 caricata una versione compatibile. Aggiungi la dipendenza mancante, aggiorna quella esistente a una versione corrispondente o rimuovi la mod che la richiede.
crash.forgeDep.title=Dipendenza mod mancante o non corrispondente
crash.gpu.summary=Minecraft non \u00E8 riuscito a inizializzare il livello grafico. Le cause pi\u00F9 comuni sono i driver GPU non aggiornati, la scelta della GPU sbagliata su un laptop con grafica sia integrata che discreta o sessioni di desktop remoto in cui OpenGL non \u00E8 accelerato.
crash.gpu.title=L'inizializzazione della grafica non \u00E8 riuscita
crash.javaVersion.manifestSuffix=La versione Java richiesta \u00E8 normalmente dichiarata dal manifest del modpack.
crash.javaVersion.summary=Una mod o una libreria in questo pacchetto \u00E8 stata compilata per una versione Java pi\u00F9 recente rispetto al runtime attualmente utilizzato{0}. La schermata di gestione del runtime del programma di avvio pu\u00F2 installare o selezionare un Java diverso.{1}
crash.javaVersion.targetSuffix=(questa mod ha come target Java {0})
crash.javaVersion.title=Mancata corrispondenza della versione Java
crash.jeiRei.summaryCollision=Un ID di ricetta \u00E8 entrato in collisione tra due mod, in genere quando due mod registrano lo stesso identificatore di ricetta o quando un mod di gestione delle ricette (JEI / REI / CraftTweaker) carica le ricette pi\u00F9 velocemente di quanto i mod sottostanti le pubblicano. La rimozione di una delle modalit\u00E0 di gestione delle ricette solitamente sblocca il lancio.
crash.jeiRei.summaryDual=Sono installati sia Just Enough Items (JEI) che Roughly Enough Items (REI). Registrano gli stessi hook del visualizzatore di ricette e uno di essi fallir\u00E0 ad ogni lancio. Scegline uno: la maggior parte dei pacchetti moderni utilizza REI su Fabric e JEI su Forge.
crash.jeiRei.titleCollision=Collisione dell'ID della ricetta
crash.jeiRei.titleDual=Conflitto JEI e REI
crash.mixin.culpritSuffix=\u2014 il mixin da "{0}" sembra essere il colpevole
crash.mixin.summary=Impossibile applicare la patch di mixin di una mod{0}. Questo di solito significa che due mod stanno tentando di applicare una patch alla stessa classe o che uno di loro non supporta ancora questa versione di Minecraft.
crash.mixin.title=Conflitto di mixaggio delle mod
crash.modLoading.summaryGeneric=Forge non \u00E8 riuscito a caricare le mod di questo pacchetto in modo pulito. Le cause pi\u00F9 comuni sono una dipendenza mancante, una mod che prende di mira una versione diversa di Minecraft/Forge o due mod che non vanno d'accordo.
crash.modLoading.summaryWithClass=Un mod ha provato a utilizzare la classe "{0}" ma non \u00E8 stata trovata. Ci\u00F2 di solito significa che manca una mod di dipendenza richiesta o che \u00E8 stata introdotta una mod di una versione diversa di Minecraft/Forge.
crash.modLoading.title=Caricamento della mod non riuscito
crash.modMcMismatch.summary=Una mod in questo pacchetto \u00E8 stata creata per Minecraft {0} ma il pacchetto sta avviando Minecraft {1}. Effettua il downgrade della versione Minecraft del pacchetto, scambia la mod con una creata per {1} o rimuovila.
crash.modMcMismatch.title=Mod creata per Minecraft {0}, il pacchetto viene eseguito {1}
crash.nativeLib.summary=La JVM non \u00E8 riuscita a caricare una delle librerie native di Minecraft (in genere LWJGL o un'associazione JNI). Le cause pi\u00F9 comuni sono un antivirus che mette in quarantena il file, un'installazione danneggiata o, su Linux, una libreria di sistema mancante. La reinstallazione del modpack di solito risolve il problema.
crash.nativeLib.title=Impossibile caricare una libreria nativa
crash.oom.detailSuffix=({0})
crash.oom.increaseRam=Aumenta la RAM massima a {0} GB
crash.oom.openRamSettings=Apri le impostazioni della RAM
crash.oom.summary=Minecraft ha esaurito la memoria{0}. La RAM massima del tuo launcher \u00E8 attualmente {1} GB; questo pacchetto ha bisogno di pi\u00F9.
crash.oom.systemTotal=Il tuo sistema ha circa {0} GB in totale.
crash.oom.title=Memoria esaurita
crash.optifineSodium.summary=Sono installati sia OptiFine che Sodium. Patchano gli stessi interni di rendering di Minecraft in modi incompatibili e non possono coesistere in sicurezza: scegline uno. Il sodio ha bisogno del caricatore di tessuti; OptiFine funziona su Forge o con il bridge OptiFabric. I pulsanti Disabilita sotto rinominano uno dei due jar in {name}.jar.disabled in modo che il caricatore lo salti al prossimo avvio.
crash.optifineSodium.title=OptiFine e Sodium sono incompatibili
crash.unknown.summary=Non siamo riusciti a identificare una causa specifica dal rapporto sull'incidente. Codice di uscita {0}. Controlla il rapporto completo qui sotto per i dettagli; la riga che inizia con "Causato da:" \u00E8 solitamente il punto di partenza pi\u00F9 utile.
crash.unknown.title=Minecraft si \u00E8 bloccato
crash.world.summary=Minecraft si \u00E8 bloccato in un file di salvataggio: un pezzo, una regione o un level.dat \u00E8 illeggibile. Cause comuni: un riavvio inaspettato durante un salvataggio precedente, due mod che scrivono NBT in conflitto o un mod rimosso tra una sessione e l'altra i cui dati sono ancora su disco. Prova a caricare un mondo diverso o ripristina da un backup recente.
crash.world.title=Impossibile leggere i dati mondiali
detailModal.crash.viewer.readFailed=Impossibile leggere {0}:\\n{1}
