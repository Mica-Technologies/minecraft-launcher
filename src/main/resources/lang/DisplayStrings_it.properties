settings.fxml.howOftenThe=La frequenza con cui viene eseguita la scansione del malware prima del lancio. Si consiglia l'esecuzione giornaliera: rileva immediatamente le modifiche manifest e altrimenti viene eseguito al massimo una volta al giorno, quindi i lanci rimangono rapidi. I singoli pacchetti possono sovrascrivere questa impostazione nella sezione Avanzate.
settings.fxml.gameFileIntegrity=Integrit\u00E0 dei file di gioco
settings.fxml.reHashesEvery=Rielabora ogni mod, libreria e risorsa in ogni pacchetto installato rispetto al suo manifest. Ripara tutto ci\u00F2 che \u00E8 danneggiato. Richiede pochi secondi per confezione: le librerie di grandi dimensioni possono eseguire un paio di minuti in totale.
