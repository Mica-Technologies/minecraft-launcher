preview.curseforge.note=CurseForge richiede una chiave API per i download programmatici, quindi il programma di avvio non pu\u00F2 ancora importare direttamente i pacchetti. Per ora, puoi aprire la pagina del progetto qui sotto, scaricare il modpack ZIP da CurseForge e riconfezionarlo come manifest Mica o attendere il prossimo aggiornamento del launcher che aggiunge il supporto per l'importazione di CurseForge.
