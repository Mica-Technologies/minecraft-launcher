officialExport.successButLoaderMissing.title=Profilo aggiunto: caricatore mancante
officialExport.successButLoaderMissing.body=Il profilo \u00E8 stato creato, ma la versione del modloader corrispondente ({0}) non \u00E8 ancora installata. Esegui il programma di installazione di modloader per completare la configurazione.
