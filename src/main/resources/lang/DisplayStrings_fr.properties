settings.fxml.curseforgeCoreApi=Cl\u00E9 API CurseForge Core. Requis pour importer les modpacks CurseForge par URL. Obtenez-en un sur console.curseforge.com \u2192 Mes cl\u00E9s API. Stock\u00E9 crypt\u00E9 sur cette machine en utilisant le m\u00EAme sch\u00E9ma qui prot\u00E8ge votre jeton de connexion Minecraft : il ne quitte jamais le lanceur en clair.
