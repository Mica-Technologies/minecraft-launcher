modal.advanced.hint=Contr\u00F4les utilisateur exp\u00E9riment\u00E9s par pack. Les valeurs par d\u00E9faut conviennent \u00E0 la plupart des utilisateurs.
modal.advanced.alwaysVerify=V\u00E9rifiez toujours les fichiers du jeu au lancement
modal.advanced.alwaysVerify.hint=Lorsqu'il est d\u00E9sactiv\u00E9 (par d\u00E9faut), le lanceur ignore le hachage des fichiers qui n'ont pas chang\u00E9 depuis la derni\u00E8re v\u00E9rification r\u00E9ussie, ce qui rend les lancements ult\u00E9rieurs sensiblement plus rapides. Activez-le si vous avez rencontr\u00E9 des probl\u00E8mes avec des fichiers corrompus ou si vous souhaitez une v\u00E9rification stricte de l'int\u00E9grit\u00E9 \u00E0 chaque fois.
modal.advanced.scanFreq.label=Fr\u00E9quence des analyses de s\u00E9curit\u00E9
modal.advanced.scanFreq.hint=\u00C0 quelle fr\u00E9quence ex\u00E9cuter l\u2019analyse des logiciels malveillants avant de lancer ce pack. "Utiliser la valeur par d\u00E9faut globale" suit ce que vous avez d\u00E9fini dans Param\u00E8tres \u2192 Avanc\u00E9. D\u00E9sactivez-le uniquement si vous faites confiance \u00E0 la source : l'analyse est la derni\u00E8re ligne de d\u00E9fense du lanceur contre les mods falsifi\u00E9s.
modal.advanced.verifyNow=V\u00E9rifiez ce pack maintenant
modal.advanced.verifyNow.hint=Re-hache chaque mod, biblioth\u00E8que et actif par rapport au manifeste du pack. R\u00E9pare tout ce qui est corrompu. Cela prend quelques secondes \u00E0 quelques minutes selon la taille du paquet.
modal.advanced.removeOfficial.hint=Ce pack est d\u00E9j\u00E0 export\u00E9 vers le lanceur officiel Minecraft. Supprimer ici supprime le profil + le r\u00E9pertoire du jeu export\u00E9\u00A0; votre installation Mica n\u2019est pas affect\u00E9e.
modal.advanced.addOfficial.hint=Cr\u00E9e un profil dans votre lanceur Minecraft officiel qui pointe vers les mods et configurations de ce pack (les versions vanille obtiennent une entr\u00E9e de profil uniquement \u2013 \u200B\u200Baucune copie n'est n\u00E9cessaire). Les packs modifi\u00E9s peuvent installer automatiquement le modloader correspondant lors de l'exportation.
modal.ack.heading=R\u00E9sultats d'analyse reconnus
modal.ack.intro=Le responsable du pack a marqu\u00E9 ces r\u00E9sultats d'analyse sp\u00E9cifiques comme connus-OK afin que le lanceur ne les bloque pas. L'analyse s'ex\u00E9cute toujours sur chaque fichier - seules les combinaisons r\u00E9pertori\u00E9es (fichier + r\u00E8gle + emplacement) sont r\u00E9duites au silence, et une mise \u00E0 jour de mod qui modifie le contenu du fichier invalide automatiquement l'entr\u00E9e.
