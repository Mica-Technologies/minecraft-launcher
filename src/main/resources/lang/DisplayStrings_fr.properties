settings.fxml.reHashesEvery=Re-hache chaque mod, biblioth\u00E8que et actif dans chaque pack install\u00E9 par rapport \u00E0 son manifeste. R\u00E9pare tout ce qui est corrompu. Cela prend quelques secondes par pack \u2013 les grandes biblioth\u00E8ques peuvent fonctionner pendant quelques minutes au total.
