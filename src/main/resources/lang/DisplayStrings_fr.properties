settings.fxml.whenEnabledQuot=Lorsqu'il est activ\u00E9, \u00AB\u00A0Installer dans le lanceur\u00A0\u00BB liens sur le site Web et Discord \u00AB\u00A0Rejoindre le jeu\u00A0\u00BB les boutons ouvrent ce lanceur et ajoutent ou lancent le modpack li\u00E9. Les h\u00F4tes non fiables n\u00E9cessitent toujours un clic de confirmation avant l'installation.
