settings.fxml.howOftenThe=\u00C0 quelle fr\u00E9quence l\u2019analyse des logiciels malveillants est ex\u00E9cut\u00E9e avant le lancement. Il est recommand\u00E9 de le faire quotidiennement\u00A0: il d\u00E9tecte imm\u00E9diatement les changements manifestes et s'ex\u00E9cute sinon au maximum une fois par jour afin que les lancements restent rapides. Les packs individuels peuvent remplacer cela dans leur section Avanc\u00E9.
