crash.audio.summary=Minecraft n'a pas pu initialiser le sous-syst\u00E8me audio. Sous Linux, il s'agit g\u00E9n\u00E9ralement d'une inad\u00E9quation PulseAudio \u2194 ALSA (en particulier dans les conteneurs ou les nouvelles installations) ; sous Windows, il s'agit g\u00E9n\u00E9ralement d'un p\u00E9riph\u00E9rique de sortie d\u00E9sactiv\u00E9/d\u00E9connect\u00E9. La musique et les sons peuvent \u00E9galement \u00EAtre d\u00E9sactiv\u00E9s dans le jeu pour contourner le probl\u00E8me.
crash.audio.title=L'initialisation audio a \u00E9chou\u00E9
crash.auth.summary=Le jeu a rejet\u00E9 le jeton de session fourni par le lanceur. Habituellement, la connexion enregistr\u00E9e a expir\u00E9\u00A0; la d\u00E9connexion du lanceur et la reconnexion effacent les choses.
crash.auth.title=Minecraft n'a pas pu s'authentifier
crash.diskFull.summary=Le syst\u00E8me a manqu\u00E9 d'espace disque au milieu du lancement. Lib\u00E9rez de l'espace (les mondes des modpacks, les anciennes captures d'\u00E9cran et les rapports de crash situ\u00E9s dans le dossier d'installation du pack sont g\u00E9n\u00E9ralement les plus gros contrevenants) et r\u00E9essayez.
crash.diskFull.title=Disque plein
crash.fileLock.summary=Un fichier que le jeu a tent\u00E9 d'\u00E9crire a \u00E9t\u00E9 verrouill\u00E9 par un autre processus. Sous Windows, il s'agit presque toujours d'un antivirus (ou Windows Defender) qui analyse le mod ou le runtime t\u00E9l\u00E9charg\u00E9. Essayez de mettre le dossier d'installation du lanceur sur liste blanche, puis r\u00E9essayez le lancement. La fermeture des clients OneDrive/sync point\u00E9s vers le dossier d'installation est l'autre solution courante.
crash.fileLock.title=Fichier verrouill\u00E9 par un autre processus
crash.forgeDep.summary=Le mod "{0}" n\u00E9cessite l'installation de {1} {2}, mais une version compatible n'est pas charg\u00E9e. Ajoutez la d\u00E9pendance manquante, mettez \u00E0 jour la d\u00E9pendance existante vers une version correspondante ou supprimez le mod qui l'exige.
crash.forgeDep.title=D\u00E9pendance de mod manquante ou incompatible
crash.gpu.summary=Minecraft n'a pas pu initialiser la couche graphique. Les causes habituelles sont des pilotes GPU obsol\u00E8tes, le mauvais GPU choisi sur un ordinateur portable avec des graphiques int\u00E9gr\u00E9s et discrets, ou des sessions de bureau \u00E0 distance o\u00F9 OpenGL n'est pas acc\u00E9l\u00E9r\u00E9.
crash.gpu.title=L'initialisation graphique a \u00E9chou\u00E9
crash.javaVersion.manifestSuffix=La version Java requise est normalement d\u00E9clar\u00E9e par le manifeste du modpack.
crash.javaVersion.summary=Un mod ou une biblioth\u00E8que de ce pack a \u00E9t\u00E9 compil\u00E9 pour une version Java plus r\u00E9cente que le runtime actuellement utilis\u00E9{0}. L'\u00E9cran de gestion de l'ex\u00E9cution du lanceur peut installer ou choisir un autre Java.{1}
crash.javaVersion.targetSuffix=(ce mod cible Java {0})
crash.javaVersion.title=Incompatibilit\u00E9 de version Java
crash.jeiRei.summaryCollision=Un identifiant de recette est entr\u00E9 en collision entre deux mods - g\u00E9n\u00E9ralement lorsque deux mods enregistrent le m\u00EAme identifiant de recette, ou lorsqu'un mod de gestion de recettes (JEI / REI / CraftTweaker) charge les recettes plus rapidement que les mods sous-jacents ne les publient. La suppression de l'un des mods de gestion des recettes d\u00E9bloque g\u00E9n\u00E9ralement le lancement.
crash.jeiRei.summaryDual=Just Enough Items (JEI) et Roughly Enough Items (REI) sont install\u00E9s. Ils enregistrent les m\u00EAmes hooks de visualisation de recettes et l'un d'eux \u00E9chouera \u00E0 chaque lancement. Choisissez-en un : la plupart des packs modernes utilisent REI sur Fabric et JEI sur Forge.
crash.jeiRei.titleCollision=Collision d'ID de recette
crash.jeiRei.titleDual=Conflit JEI et REI
crash.mixin.culpritSuffix=\u2014 le mixin de "{0}" semble \u00EAtre le coupable
crash.mixin.summary=Le patch mixin d'un mod n'a pas pu s'appliquer {0}. Cela signifie g\u00E9n\u00E9ralement que deux mods tentent de patcher la m\u00EAme classe, ou que l'un d'eux ne prend pas encore en charge cette version de Minecraft.
crash.mixin.title=Conflit de mixage de modules
crash.modLoading.summaryGeneric=Forge n'a pas pu charger proprement les mods de ce pack. Les causes les plus courantes sont une d\u00E9pendance manquante, un mod qui cible une version diff\u00E9rente de Minecraft/Forge, ou encore deux mods qui ne s'entendent pas.
crash.modLoading.summaryWithClass=Un mod a essay\u00E9 d'utiliser la classe "{0}" mais elle n'a pas \u00E9t\u00E9 trouv\u00E9e. Cela signifie g\u00E9n\u00E9ralement qu'un mod de d\u00E9pendance requis est manquant ou qu'un mod d'une autre version de Minecraft/Forge s'est infiltr\u00E9.
crash.modLoading.title=Le chargement du module a \u00E9chou\u00E9
crash.modMcMismatch.summary=Un mod de ce pack a \u00E9t\u00E9 construit pour Minecraft {0} mais le pack lance Minecraft {1}. Soit r\u00E9trogradez la version Minecraft du pack, \u00E9changez le mod contre un mod con\u00E7u pour {1}, ou supprimez-le.
crash.modMcMismatch.title=Mod construit pour Minecraft {0}, le pack ex\u00E9cute {1}
crash.nativeLib.summary=La JVM n'a pas pu charger l'une des biblioth\u00E8ques natives de Minecraft (g\u00E9n\u00E9ralement LWJGL ou une liaison JNI). Les causes habituelles sont un antivirus mettant le fichier en quarantaine, une installation corrompue ou, sous Linux, une biblioth\u00E8que syst\u00E8me manquante. La r\u00E9installation du modpack r\u00E9sout g\u00E9n\u00E9ralement le probl\u00E8me.
crash.nativeLib.title=Impossible de charger une biblioth\u00E8que native
crash.oom.detailSuffix=({0})
crash.oom.increaseRam=Augmentez la RAM maximale \u00E0 {0} Go
crash.oom.openRamSettings=Ouvrir les param\u00E8tres de la RAM
crash.oom.summary=Minecraft n'a plus de m\u00E9moire{0}. La RAM maximale de votre lanceur est actuellement de {1}\u00A0Go\u00A0; ce pack a besoin de plus.
crash.oom.systemTotal=Votre syst\u00E8me dispose d'environ {0}\u00A0Go au total.
crash.oom.title=Manque de m\u00E9moire
crash.optifineSodium.summary=OptiFine et Sodium sont install\u00E9s. Ils corrigent les m\u00EAmes \u00E9l\u00E9ments internes de rendu Minecraft de mani\u00E8re incompatible et ne peuvent pas coexister en toute s\u00E9curit\u00E9 \u2013 choisissez-en un. Sodium a besoin du chargeur de tissus\u00A0; OptiFine fonctionne sur Forge ou avec le pont OptiFabric. Les boutons D\u00E9sactiver ci-dessous renomment l'un des deux fichiers jar en {name}.jar.disabled afin que le chargeur l'ignore au prochain lancement.
crash.optifineSodium.title=OptiFine et Sodium sont incompatibles
crash.unknown.summary=Nous n'avons pas pu identifier une cause sp\u00E9cifique \u00E0 partir du rapport d'accident. Code de sortie {0}. Consultez le rapport complet ci-dessous pour plus de d\u00E9tails\u00A0; la ligne commen\u00E7ant par \u00AB Caus\u00E9 par : \u00BB est g\u00E9n\u00E9ralement le point de d\u00E9part le plus utile.
crash.unknown.title=Minecraft s'est \u00E9cras\u00E9
crash.world.summary=Minecraft s'est \u00E9touff\u00E9 avec un fichier de sauvegarde\u00A0: un morceau, une r\u00E9gion ou un niveau.dat est illisible. Causes courantes\u00A0: un red\u00E9marrage inattendu lors d'une sauvegarde pr\u00E9c\u00E9dente, deux mods \u00E9crivant du NBT en conflit ou un mod supprim\u00E9 entre des sessions dont les donn\u00E9es sont toujours sur le disque. Essayez de charger un monde diff\u00E9rent ou restaurez \u00E0 partir d'une sauvegarde r\u00E9cente.
crash.world.title=Les donn\u00E9es mondiales n'ont pas pu \u00EAtre lues
