preview.curseforge.note=CurseForge n\u00E9cessite une cl\u00E9 API pour les t\u00E9l\u00E9chargements programmatiques, le lanceur ne peut donc pas encore importer ses packs directement. Pour l'instant, vous pouvez ouvrir la page du projet ci-dessous, t\u00E9l\u00E9charger le modpack ZIP depuis CurseForge et le reconditionner en tant que manifeste Mica ou attendre la prochaine mise \u00E0 jour du lanceur qui ajoute la prise en charge de l'importation CurseForge.
