settings.fxml.showWhatYou=Montrez \u00E0 quoi vous jouez sur votre profil Discord. N\u00E9cessite que l'application de bureau Discord soit ex\u00E9cut\u00E9e sur la m\u00EAme machine \u2013 le lanceur lui parle localement via IPC, aucun jeton ni connexion n'est requis.
settings.fxml.friendInvites=Invitations d'amis
settings.fxml.allowDiscordInvites=Autoriser les invitations Discord
settings.fxml.whenEnabledFriends=Lorsque cette option est activ\u00E9e, les amis qui voient votre statut Discord pendant que vous \u00EAtes en jeu re\u00E7oivent une option \u00AB\u00A0Rejoindre le jeu\u00A0\u00BB. bouton sur votre profil qui installe et lance automatiquement le m\u00EAme modpack sur leur machine. D\u00E9sactive uniquement le bouton Rejoindre \u2013 la pr\u00E9sence riche elle-m\u00EAme est contr\u00F4l\u00E9e par la bascule ci-dessus.
settings.fxml.youCanAlso=Vous pouvez \u00E9galement cliquer avec le bouton droit sur n'importe quelle carte de modpack dans le menu principal et choisir "Copier le lien d'invitation Discord". pour partager l'URL de participation directement dans n'importe quel chat.
settings.fxml.rgbLighting=\u00C9clairage RVB
settings.fxml.lightingBackend=Syst\u00E8me d'\u00E9clairage
settings.fxml.enableRgbLighting=Activer l'\u00E9clairage RVB
settings.fxml.whenEnabledThe=Lorsqu'il est activ\u00E9, le lanceur illumine votre clavier pris en charge avec des couleurs d\u00E9riv\u00E9es du modpack pendant la lecture. D\u00E9sactiv\u00E9 par d\u00E9faut\u00A0: activez-le uniquement lorsque vous souhaitez que le lanceur communique avec vos p\u00E9riph\u00E9riques.
settings.fxml.backend=Back-end\u00A0:
settings.fxml.disabled=D\u00E9sactiv\u00E9
settings.fxml.autoRunsEvery=Auto ex\u00E9cute tous les backends activ\u00E9s ci-dessous qui disposent de mat\u00E9riel disponible, donc une plate-forme mixte (par exemple des ventilateurs Razer + un clavier Windows Dynamic Lighting) illumine tout en m\u00EAme temps. Choisissez plut\u00F4t un backend sp\u00E9cifique pour forcer uniquement celui-l\u00E0.
