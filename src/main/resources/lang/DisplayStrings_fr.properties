# ============================================================================
#  Mica Minecraft Launcher — Display Strings (English, source of truth)
# ============================================================================
#
# This file is the canonical source for every user-visible string the
# launcher renders at runtime. Per-locale companions live alongside as
# `DisplayStrings_<bcp47-tag>.properties` (e.g. `DisplayStrings_fr-FR`,
# `DisplayStrings_zh-CN`) — see `SupportedLocales.ENTRIES` for the full
# list. The per-locale files are generated by `tools/i18n/translate-locales.js`
# and should never be hand-edited unless you're correcting a translation
# the auto-translator got wrong.
#
# ---------------------------------------------------------------------------
#  Key naming conventions
# ---------------------------------------------------------------------------
#
#  * New keys use dot-namespaced form:  <screen>.<element>.<purpose>
#    Examples:
#       browse.filter.type.label
#       console.title.crashed
#       notification.install.failed.body
#       dialog.editor.discardChanges.button.discard
#
#  * The legacy `ALL_CAPS_LIKE_THIS` keys at the top of this file are
#    preserved for back-compat with `LocalizationManager`'s static-final
#    fields. Don't add new ALL_CAPS keys — every new string should use
#    the dot-namespaced form.
#
#  * Parameterised messages use MessageFormat slots ({0}, {1}, ...).
#    Slots survive translation because `translate-locales.js` swaps
#    them for `__MMCL_PH<n>__` sentinels around each API call. Never
#    string-concatenate user-visible data into a template.
#
#  * Apostrophes inside MessageFormat strings must be doubled (it''s
#    instead of it's) per Java's MessageFormat rules — single quotes
#    are interpreted as quoting characters that suppress slot
#    substitution.
#
# ---------------------------------------------------------------------------
#  Contributing translations
# ---------------------------------------------------------------------------
#
#  * The recommended path is to add or fix English keys here, then run
#    `cd tools/i18n && npm run translate` to regenerate every locale
#    file incrementally (existing translations aren't touched unless
#    you pass `--force`).
#
#  * If you spot a bad auto-translation in `DisplayStrings_<tag>`,
#    edit that locale file directly — the next `npm run translate`
#    run will leave hand-edited keys alone because they're already
#    present in the target.
#
#  * New locales: add an entry to `SupportedLocales.ENTRIES` in Java
#    (also mirrored in `TARGET_LOCALES` in `translate-locales.js`)
#    and re-run `npm run translate`.
#
