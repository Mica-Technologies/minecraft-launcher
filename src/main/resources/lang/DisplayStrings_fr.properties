quickStart.welcome.heading=Bienvenue sur le lanceur Mica Minecraft
quickStart.welcome.subtitle=Une configuration rapide pour que le lanceur se sente bien d\u00E8s la premi\u00E8re session. Choisissez un th\u00E8me, ajustez votre allocation de m\u00E9moire et activez quelques pr\u00E9f\u00E9rences, que vous pourrez toutes modifier ult\u00E9rieurement dans Param\u00E8tres.
quickStart.welcome.hint=Cliquez sur Suivant pour commencer. Vous pouvez \u00E9galement ignorer\u00A0: le lanceur d\u00E9marrera avec des param\u00E8tres par d\u00E9faut raisonnables et vous pourrez configurer les \u00E9l\u00E9ments \u00E0 partir des param\u00E8tres \u00E0 tout moment.
