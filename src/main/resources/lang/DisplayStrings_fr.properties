preview.curseforge.note=CurseForge n\u00E9cessite une cl\u00E9 API pour les t\u00E9l\u00E9chargements programmatiques, le lanceur ne peut donc pas encore importer ses packs directement. Pour l'instant, vous pouvez ouvrir la page du projet ci-dessous, t\u00E9l\u00E9charger le modpack ZIP depuis CurseForge et le reconditionner en tant que manifeste Mica ou attendre la prochaine mise \u00E0 jour du lanceur qui ajoute la prise en charge de l'importation CurseForge.
preview.technic.detected=D\u00E9tection d'une URL de modpack Technic.
preview.technic.sourceLabel=Source : Technique
preview.technic.note=L'API de Technic n\u00E9cessite un client authentifi\u00E9 pour l'acc\u00E8s par programmation, ce lanceur ne peut donc pas encore importer de packs directement depuis la plateforme Technic. La solution de contournement\u00A0:
preview.technic.step1=1. Ouvrez la page du projet ci-dessous.
preview.technic.step2=2. Recherchez le lien \u00AB\u00A0T\u00E9l\u00E9chargement du serveur\u00A0\u00BB sur la page du pack et t\u00E9l\u00E9chargez le ZIP du serveur.
preview.technic.step3=3. De retour dans ce lanceur, cliquez sur "Importer ZIP" sur l'\u00E9cran de navigation et choisissez le ZIP t\u00E9l\u00E9charg\u00E9. Le lanceur reconna\u00EEtra le format du pack serveur Technic et le configurera pour vous.
