quickStart.theme.subtitle=Les th\u00E8mes modifient la palette de couleurs et le traitement de surface du lanceur. Cliquez sur n\u2019importe quelle option pour l\u2019appliquer en direct \u2013 choisissez celle qui vous convient.
quickStart.ram.heading=Allocation de m\u00E9moire
quickStart.ram.subtitle=Quelle quantit\u00E9 de RAM Minecraft doit-il \u00EAtre autoris\u00E9 \u00E0 utiliser ? La plupart des modpacks ont besoin de 4 \u00E0 8 Go\u00A0; les modpacks lourds (plus de 300 mods) peuvent n\u00E9cessiter plus de 12 Go.
quickStart.ram.recommendation=M\u00E9moire syst\u00E8me d\u00E9tect\u00E9e\u00A0: {0}\u00A0Go. Allocation recommand\u00E9e\u00A0: {1}\u00A0Go (50\u00A0% de la RAM syst\u00E8me, plafonn\u00E9e \u00E0 {2}\u00A0Go).
