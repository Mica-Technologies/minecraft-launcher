settings.fxml.turnOffThe=D\u00E9sactivez les int\u00E9grations que vous ne souhaitez pas que le lanceur atteigne, m\u00EAme si leur logiciel est install\u00E9. D\u00E9sactiv\u00E9 par d\u00E9faut pour Chroma REST puisque le SDK natif le remplace sur toute installation Synapse fonctionnelle.
settings.fxml.menuEffect=Effet de menu
settings.fxml.lightUpDevices=\u00C9clairer les appareils dans les menus
settings.fxml.whenOnYour=Lorsqu'ils sont allum\u00E9s, vos appareils s'illuminent lorsque vous \u00EAtes dans les menus du lanceur, en utilisant la couleur d'accentuation du th\u00E8me actif. L'ouverture de la vue d\u00E9taill\u00E9e d'un modpack passe aux couleurs \u00E9chantillonn\u00E9es de ce modpack. Lorsqu'ils sont \u00E9teints, les appareils restent \u00E9teints entre les lancements de jeux.
settings.fxml.animationStyle=Style d'animation
settings.fxml.solidSingleSteady=Solide\u00A0: une seule couleur constante. Respirer\u00A0: fondu entrant et sortant lent (par d\u00E9faut). Pulse : pulse plus rapide entre l\u2019accent et son compl\u00E9ment. Cycle\u00A0: boucle fluide \u00E0 travers 3-4 couleurs\u00A0\u2013 \u00E9chantillonn\u00E9es \u00E0 partir du logo du modpack lorsqu'un pack est mis au point, sinon des teintes analogues autour de l'accent du th\u00E8me. Arc-en-ciel\u00A0: balayage continu des teintes sur tout le spectre, sans d\u00E9pendance au pack.
settings.fxml.inGameEffects=Effets en jeu
settings.fxml.useModpackColors=Utiliser les couleurs du modpack
settings.fxml.lightUpThe=Illuminez le clavier avec des couleurs \u00E9chantillonn\u00E9es \u00E0 partir du logo du modpack en cours d'ex\u00E9cution. Lorsqu'ils sont d\u00E9sactiv\u00E9s, les effets utilisent la palette d'accents du th\u00E8me du lanceur.
settings.fxml.highlightMinecraftKeys=Mettre en surbrillance les cl\u00E9s Minecraft
settings.fxml.overlayWasdE=Superposez WASD / E / Q / F / Space / Shift / Ctrl avec un accent contrast\u00E9 sur l'arri\u00E8re-plan de couleur du modpack, afin que les touches de gameplay se d\u00E9marquent en un coup d'\u0153il.
settings.fxml.test=Test
settings.fxml.flashesSolidMagenta=Clignote en magenta fixe (RVB 255, 0, 255) sur chaque appareil connect\u00E9 pendant 2 secondes, puis restaure l'effet pr\u00E9c\u00E9dent. Un flash constant et \u00E0 pleine luminosit\u00E9 confirme que le backend atteint votre mat\u00E9riel. Remarque pour Razer Chroma\u00A0: Chroma Connect transf\u00E8re uniquement les images vers des appareils tiers (ventilateurs de bo\u00EEtier, bandes, etc.) lorsqu'un appareil Razer principal (clavier, souris ou tapis de souris) est \u00E9galement connect\u00E9. Si seuls ces appareils tiers scintillent ou restent sombres, branchez un clavier/une souris Razer et r\u00E9essayez. Le scintillement avec un appareil principal pr\u00E9sent signifie g\u00E9n\u00E9ralement qu'une autre application RVB (Synapse, iCUE, Signal RGB) se bat pour l'appareil.
