settings.fxml.theLauncherUses=O iniciador usa o seguinte software de c\u00F3digo aberto:
settings.fxml.fullLicenseTexts=Os textos completos da licen\u00E7a s\u00E3o fornecidos com o inicializador instalado na pasta LICENSES e est\u00E3o dispon\u00EDveis no reposit\u00F3rio de origem deste projeto.
