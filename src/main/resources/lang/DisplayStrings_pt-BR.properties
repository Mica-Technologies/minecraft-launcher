settings.fxml.modernMinecraftVersions=As vers\u00F5es modernas do Minecraft usam as distribui\u00E7\u00F5es de tempo de execu\u00E7\u00E3o Java oficiais da Mojang. Legacy Forge (Minecraft 1.12.2 e inferior) usa Bell-SW Liberica JRE 8 para compatibilidade.
