crash.diskFull.summary=O sistema ficou sem espa\u00E7o em disco durante a inicializa\u00E7\u00E3o. Libere espa\u00E7o \u2013 mundos modpack, capturas de tela antigas e relat\u00F3rios de falhas na pasta de instala\u00E7\u00E3o do pacote geralmente s\u00E3o os maiores infratores \u2013 e tente novamente.
crash.diskFull.title=Disco cheio
crash.fileLock.summary=Um arquivo que o jogo tentou gravar foi bloqueado por outro processo. No Windows, quase sempre \u00E9 um antiv\u00EDrus (ou Windows Defender) que verifica o mod baixado ou o tempo de execu\u00E7\u00E3o \u2013 tente colocar a pasta de instala\u00E7\u00E3o do inicializador na lista de permiss\u00F5es e tente iniciar novamente. Fechar clientes OneDrive/sincroniza\u00E7\u00E3o apontados para a pasta de instala\u00E7\u00E3o \u00E9 outra solu\u00E7\u00E3o comum.
crash.fileLock.title=Arquivo bloqueado por outro processo
crash.forgeDep.summary=O mod "{0}" precisa de {1} {2} instalado, mas uma vers\u00E3o compat\u00EDvel n\u00E3o est\u00E1 carregada. Adicione a depend\u00EAncia ausente, atualize a existente para uma vers\u00E3o correspondente ou remova o mod que a requer.
crash.forgeDep.title=Depend\u00EAncia de mod ausente ou incompat\u00EDvel
crash.gpu.summary=O Minecraft n\u00E3o conseguiu inicializar a camada gr\u00E1fica. As causas comuns s\u00E3o drivers de GPU desatualizados, a escolha da GPU errada em um laptop com gr\u00E1ficos integrados e discretos ou sess\u00F5es de \u00E1rea de trabalho remota onde o OpenGL n\u00E3o \u00E9 acelerado.
crash.gpu.title=Falha na inicializa\u00E7\u00E3o gr\u00E1fica
crash.javaVersion.manifestSuffix=A vers\u00E3o Java necess\u00E1ria normalmente \u00E9 declarada pelo manifesto do modpack.
crash.javaVersion.summary=Um mod ou biblioteca neste pacote foi compilado para uma vers\u00E3o Java mais recente do que o tempo de execu\u00E7\u00E3o que est\u00E1 sendo usado atualmente{0}. A tela de gerenciamento de tempo de execu\u00E7\u00E3o do inicializador pode instalar ou escolher um Java diferente.{1}
crash.javaVersion.targetSuffix=(este mod tem como alvo Java {0})
crash.javaVersion.title=Incompatibilidade de vers\u00E3o Java
crash.jeiRei.summaryCollision=Um ID de receita colidiu entre dois mods \u2014 normalmente quando dois mods registram o mesmo identificador de receita ou quando um mod de gerenciamento de receitas (JEI/REI/CraftTweaker) carrega receitas mais r\u00E1pido do que os mods subjacentes as publicam. A remo\u00E7\u00E3o de um dos mods de gerenciamento de receitas geralmente desbloqueia o lan\u00E7amento.
crash.jeiRei.summaryDual=Ambos Just Enough Items (JEI) e Roughly Enough Items (REI) est\u00E3o instalados. Eles registram os mesmos ganchos do visualizador de receitas e um deles falhar\u00E1 a cada lan\u00E7amento. Escolha um \u2013 a maioria dos pacotes modernos usa REI no Fabric e JEI no Forge.
crash.jeiRei.titleCollision=Colis\u00E3o de ID de receita
crash.jeiRei.titleDual=Conflito JEI e REI
crash.mixin.culpritSuffix=\u2014 mixin de "{0}" parece ser o culpado
crash.mixin.summary=O patch mixin de um mod falhou ao aplicar{0}. Isso geralmente significa que dois mods est\u00E3o tentando corrigir a mesma classe ou um deles ainda n\u00E3o oferece suporte a esta vers\u00E3o do Minecraft.
crash.mixin.title=Conflito de mixagem de mod
crash.modLoading.summaryGeneric=Forge n\u00E3o conseguiu carregar os mods deste pacote de forma limpa. As causas mais comuns s\u00E3o uma depend\u00EAncia ausente, um mod direcionado a uma vers\u00E3o diferente do Minecraft/Forge ou dois mods que n\u00E3o se d\u00E3o bem.
crash.modLoading.summaryWithClass=Um mod tentou usar a classe "{0}" mas n\u00E3o foi encontrado. Isso geralmente significa que um mod de depend\u00EAncia necess\u00E1rio est\u00E1 faltando ou um mod de uma vers\u00E3o diferente do Minecraft/Forge entrou sorrateiramente.
crash.modLoading.title=Falha no carregamento do mod
crash.modMcMismatch.summary=Um mod neste pacote foi criado para Minecraft {0}, mas o pacote est\u00E1 lan\u00E7ando Minecraft {1}. Fa\u00E7a o downgrade da vers\u00E3o do Minecraft do pacote, troque o mod por um constru\u00EDdo para {1} ou remova-o.
crash.modMcMismatch.title=Mod criado para Minecraft {0}, pacote executado em {1}
crash.nativeLib.summary=A JVM n\u00E3o p\u00F4de carregar uma das bibliotecas nativas do Minecraft (normalmente LWJGL ou uma liga\u00E7\u00E3o JNI). As causas comuns s\u00E3o um antiv\u00EDrus colocando o arquivo em quarentena, uma instala\u00E7\u00E3o corrompida ou \u2013 no Linux \u2013 uma biblioteca de sistema ausente. Reinstalar o modpack geralmente resolve o problema.
crash.nativeLib.title=N\u00E3o foi poss\u00EDvel carregar uma biblioteca nativa
crash.oom.detailSuffix=({0})
crash.oom.increaseRam=Aumente o m\u00E1ximo de RAM para {0} GB
crash.oom.openRamSettings=Abra as configura\u00E7\u00F5es de RAM
crash.oom.summary=O Minecraft ficou sem mem\u00F3ria{0}. A RAM m\u00E1xima do seu inicializador \u00E9 atualmente de {1} GB; este pacote precisa de mais.
crash.oom.systemTotal=Seu sistema tem cerca de {0} GB no total.
crash.oom.title=Sem mem\u00F3ria
crash.optifineSodium.summary=Tanto OptiFine quanto Sodium est\u00E3o instalados. Eles corrigem os mesmos componentes internos de renderiza\u00E7\u00E3o do Minecraft de maneiras incompat\u00EDveis e n\u00E3o podem coexistir com seguran\u00E7a \u2013 escolha um. O s\u00F3dio precisa do carregador de tecido; OptiFine funciona no Forge ou com a ponte OptiFabric. Os bot\u00F5es Desabilitar abaixo renomeiam um dos dois jars para {name}.jar.disabled para que o carregador o ignore na pr\u00F3xima inicializa\u00E7\u00E3o.
crash.optifineSodium.title=OptiFine e S\u00F3dio s\u00E3o incompat\u00EDveis
crash.unknown.summary=N\u00E3o conseguimos identificar uma causa espec\u00EDfica no relat\u00F3rio de falha. C\u00F3digo de sa\u00EDda {0}. Verifique o relat\u00F3rio completo abaixo para obter detalhes; a linha que come\u00E7a com "Causado por:" geralmente \u00E9 o ponto de partida mais \u00FAtil.
crash.unknown.title=Minecraft travou
crash.world.summary=O Minecraft engasgou com um arquivo salvo \u2013 um peda\u00E7o, regi\u00E3o ou n\u00EDvel.dat \u00E9 ileg\u00EDvel. Causas comuns: uma reinicializa\u00E7\u00E3o inesperada durante um salvamento anterior, dois mods gravando NBT conflitantes ou um mod removido entre sess\u00F5es cujos dados ainda est\u00E3o no disco. Tente carregar um mundo diferente ou restaure a partir de um backup recente.
crash.world.title=Os dados mundiais n\u00E3o puderam ser lidos
