settings.fxml.showWhatYou=Mostre o que voc\u00EA est\u00E1 jogando no seu perfil do Discord. Requer que o aplicativo de desktop Discord esteja em execu\u00E7\u00E3o na mesma m\u00E1quina \u2013 o inicializador se comunica com ele localmente via IPC, sem necessidade de token ou login.
settings.fxml.friendInvites=Convites de amigos
settings.fxml.allowDiscordInvites=Permitir convites do Discord
settings.fxml.whenEnabledFriends=Quando ativado, os amigos que veem seu status no Discord enquanto voc\u00EA est\u00E1 no jogo recebem a op\u00E7\u00E3o &quot;Entrar no jogo&quot;. bot\u00E3o em seu perfil que instala automaticamente e inicia o mesmo modpack em sua m\u00E1quina. Desativa apenas o bot\u00E3o de ades\u00E3o \u2013 a presen\u00E7a rica em si \u00E9 controlada pelo bot\u00E3o de altern\u00E2ncia acima.
settings.fxml.youCanAlso=Voc\u00EA tamb\u00E9m pode clicar com o bot\u00E3o direito em qualquer cart\u00E3o modpack no menu principal e escolher &quot;Copiar link de convite do Discord&quot; para compartilhar o URL de ingresso diretamente em qualquer bate-papo.
