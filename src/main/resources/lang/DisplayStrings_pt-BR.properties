settings.fxml.whenOffThe=Quando desativado, o inicializador n\u00E3o alcan\u00E7a a inicializa\u00E7\u00E3o nem mostra o \u00EDcone de atualiza\u00E7\u00E3o dispon\u00EDvel na barra de navega\u00E7\u00E3o.
