settings.fxml.asusAuraLegacy=ASUS Aura (SDK legado)
settings.fxml.razerChromaRest=Razer Chroma (REST \u2013 legado)
settings.fxml.turnOffThe=Desative as integra\u00E7\u00F5es que voc\u00EA n\u00E3o deseja que o inicializador alcance, mesmo que o software esteja instalado. Desativado por padr\u00E3o para Chroma REST, j\u00E1 que o SDK nativo o substitui em qualquer instala\u00E7\u00E3o funcional do Synapse.
settings.fxml.menuEffect=Efeito de menu
settings.fxml.lightUpDevices=Ilumine dispositivos em menus
settings.fxml.whenOnYour=Quando ativado, seus dispositivos acendem enquanto voc\u00EA est\u00E1 nos menus do iniciador, usando a cor de destaque do tema ativo. Abrir a visualiza\u00E7\u00E3o detalhada de um modpack muda para as cores amostradas desse modpack. Quando desligado, os dispositivos ficam escuros entre o lan\u00E7amento do jogo.
settings.fxml.animationStyle=Estilo de anima\u00E7\u00E3o
settings.fxml.solidSingleSteady=S\u00F3lido: \u00FAnica cor est\u00E1vel. Respirar: entrada e sa\u00EDda lenta (padr\u00E3o). Pulso: pulso mais r\u00E1pido entre o acento e seu complemento. Ciclo: loop suave atrav\u00E9s de 3-4 cores \u2013 amostrado do logotipo do modpack quando um pacote est\u00E1 em foco, caso contr\u00E1rio, tons an\u00E1logos em torno do destaque do tema. Arco-\u00EDris: varredura cont\u00EDnua de matiz em todo o espectro, sem depend\u00EAncia de embalagem.
settings.fxml.inGameEffects=Efeitos no jogo
settings.fxml.useModpackColors=Use cores modpack
settings.fxml.lightUpThe=Ilumine o teclado com amostras de cores do logotipo do modpack em execu\u00E7\u00E3o. Quando desativado, os efeitos usam a paleta de destaque do tema do iniciador.
settings.fxml.highlightMinecraftKeys=Destaque as chaves do Minecraft
settings.fxml.overlayWasdE=Sobreponha WASD / E / Q / F / Espa\u00E7o / Shift / Ctrl em um acento contrastante sobre o fundo colorido do modpack, para que as teclas de jogo se destaquem \u00E0 primeira vista.
settings.fxml.test=Teste
settings.fxml.flashesSolidMagenta=Pisca em magenta s\u00F3lido (RGB 255, 0, 255) em todos os dispositivos conectados por 2 segundos e depois restaura o efeito anterior. Um flash constante e com brilho total confirma que o back-end est\u00E1 chegando ao seu hardware. Nota para o Razer Chroma: O Chroma Connect apenas encaminha frames para dispositivos de terceiros (ventiladores de gabinete, tiras, etc.) quando um dispositivo Razer principal \u2013 teclado, mouse ou mousepad \u2013 tamb\u00E9m est\u00E1 conectado. Se apenas esses dispositivos de terceiros piscarem ou permanecerem escuros, conecte um teclado/mouse Razer e tente novamente. A cintila\u00E7\u00E3o com um dispositivo principal presente geralmente significa que outro aplicativo RGB (Synapse, iCUE, Signal RGB) est\u00E1 lutando pelo dispositivo.
settings.fxml.testConnection=Conex\u00E3o de teste
