modal.ack.intro=O mantenedor do pacote marcou essas descobertas espec\u00EDficas da verifica\u00E7\u00E3o como conhecidas-OK para que o inicializador n\u00E3o as bloqueie. A verifica\u00E7\u00E3o ainda \u00E9 executada em todos os arquivos \u2013 apenas as combina\u00E7\u00F5es listadas (arquivo + regra + local) s\u00E3o silenciadas, e uma atualiza\u00E7\u00E3o de mod que altera o conte\u00FAdo do arquivo invalida automaticamente a entrada.
