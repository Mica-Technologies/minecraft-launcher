modal.advanced.hint=Controles de usu\u00E1rio avan\u00E7ado por pacote. Os padr\u00F5es s\u00E3o adequados para a maioria dos usu\u00E1rios.
modal.advanced.alwaysVerify=Sempre verifique os arquivos do jogo no lan\u00E7amento
modal.advanced.alwaysVerify.hint=Quando desativado (padr\u00E3o), o iniciador ignora o novo hash dos arquivos que n\u00E3o foram alterados desde a \u00FAltima verifica\u00E7\u00E3o bem-sucedida, tornando as inicializa\u00E7\u00F5es subsequentes visivelmente mais r\u00E1pidas. Ative se voc\u00EA teve problemas com arquivos corrompidos ou deseja uma verifica\u00E7\u00E3o de integridade rigorosa sempre.
