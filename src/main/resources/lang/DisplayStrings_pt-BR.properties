settings.fxml.minecraftIsA=Minecraft \u00E9 uma marca registrada da Mojang Synergies AB e Microsoft Corporation. Este iniciador usa o nome Minecraft apenas para identificar o jogo que lan\u00E7a e n\u00E3o \u00E9 afiliado, endossado, patrocinado ou aprovado especificamente pela Mojang AB ou Microsoft.
