settings.fxml.whenEnabledThe=Quando ativado, o iniciador ilumina o teclado compat\u00EDvel com cores derivadas do modpack durante o jogo. Padr\u00E3o desativado \u2013 ative apenas quando quiser que o inicializador se comunique com seus dispositivos perif\u00E9ricos.
