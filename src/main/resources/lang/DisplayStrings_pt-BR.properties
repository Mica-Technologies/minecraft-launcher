quickStart.welcome.heading=Bem-vindo ao Lan\u00E7ador Mica Minecraft
quickStart.welcome.subtitle=Uma configura\u00E7\u00E3o r\u00E1pida para que o iniciador pare\u00E7a correto desde a primeira sess\u00E3o. Escolha um tema, ajuste sua aloca\u00E7\u00E3o de mem\u00F3ria e alterne algumas prefer\u00EAncias \u2013 todas as quais voc\u00EA pode alterar posteriormente em Configura\u00E7\u00F5es.
