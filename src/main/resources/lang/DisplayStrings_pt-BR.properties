settings.fxml.howOftenThe=Com que frequ\u00EAncia a verifica\u00E7\u00E3o de malware \u00E9 executada antes do lan\u00E7amento. Diariamente \u00E9 recomendado \u2013 captura as altera\u00E7\u00F5es do manifesto imediatamente e, caso contr\u00E1rio, \u00E9 executado no m\u00E1ximo uma vez por dia para que os lan\u00E7amentos sejam r\u00E1pidos. Pacotes individuais podem substituir isso na se\u00E7\u00E3o Avan\u00E7ado.
