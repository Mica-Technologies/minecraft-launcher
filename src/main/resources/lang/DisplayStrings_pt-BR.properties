settings.fxml.reHashesEvery=Refaz o hash de cada mod, biblioteca e ativo em cada pacote instalado em seu manifesto. Repara qualquer coisa corrompida. Leva alguns segundos por pacote \u2013 bibliotecas grandes podem durar alguns minutos no total.
