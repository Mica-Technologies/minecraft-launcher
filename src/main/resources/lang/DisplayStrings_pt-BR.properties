settings.fxml.whenLwjglArm=Quando o LWJGL ARM Patching est\u00E1 habilitado, o inicializador substitui x86_64 LWJGL2 e nativos jinput fornecidos com o Minecraft 1.12.2 e vers\u00F5es anteriores por bin\u00E1rios ARM64 criados pela comunidade. Agradecimentos aos mantenedores desses projetos:
