settings.fxml.reHashesEvery=Refaz o hash de cada mod, biblioteca e ativo em cada pacote instalado em seu manifesto. Repara qualquer coisa corrompida. Leva alguns segundos por pacote \u2013 bibliotecas grandes podem durar alguns minutos no total.
settings.fxml.verifyAllGame=Verifique todos os arquivos do jogo
settings.fxml.thirdPartyIntegrations=Integra\u00E7\u00F5es de terceiros
settings.fxml.curseforgeCoreApi=Chave de API principal do CurseForge. Necess\u00E1rio para importar modpacks CurseForge por URL. Obtenha um em console.curseforge.com \u2192 Minhas chaves de API. Armazenado criptografado nesta m\u00E1quina usando o mesmo esquema que protege seu token de login do Minecraft \u2013 ele nunca sai do inicializador em texto simples.
