quickStart.theme.subtitle=Os temas alteram a paleta de cores e o tratamento de superf\u00EDcie do iniciador. Clique em qualquer op\u00E7\u00E3o para aplic\u00E1-la ao vivo \u2013 escolha a que achar melhor.
quickStart.ram.heading=Aloca\u00E7\u00E3o de mem\u00F3ria
quickStart.ram.subtitle=Quanta RAM o Minecraft deve ter permiss\u00E3o para usar? A maioria dos modpacks precisa de 4 a 8 GB; modpacks pesados \u200B\u200B(mais de 300 mods) podem exigir mais de 12 GB.
