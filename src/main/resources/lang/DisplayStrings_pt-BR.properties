preview.curseforge.fileIdLabel=ID do arquivo: {0}
preview.curseforge.note=CurseForge requer uma chave de API para downloads program\u00E1ticos, portanto o inicializador ainda n\u00E3o pode importar seus pacotes diretamente. Por enquanto, voc\u00EA pode abrir a p\u00E1gina do projeto abaixo, baixar o modpack ZIP do CurseForge e reempacot\u00E1-lo como um manifesto Mica ou aguardar a pr\u00F3xima atualiza\u00E7\u00E3o do inicializador que adiciona suporte de importa\u00E7\u00E3o do CurseForge.
preview.technic.detected=Detectado um URL do modpack do Technic.
preview.technic.sourceLabel=Fonte: T\u00E9cnica
preview.technic.note=A API do Technic requer um cliente autenticado para acesso program\u00E1tico, portanto, este iniciador ainda n\u00E3o pode importar pacotes diretamente da plataforma Technic. A solu\u00E7\u00E3o alternativa:
preview.technic.step1=1. Abra a p\u00E1gina do projeto abaixo.
preview.technic.step2=2. Procure o link "Download do Servidor" na p\u00E1gina do pacote e baixe o ZIP do servidor.
preview.technic.step3=3. De volta a este inicializador, clique em \u201CImportar ZIP\u201D na tela de navega\u00E7\u00E3o e escolha o ZIP baixado. O inicializador reconhecer\u00E1 o formato do pacote de servidor Technic e o configurar\u00E1 para voc\u00EA.
