modal.advanced.scanFreq.hint=Com que frequ\u00EAncia executar a verifica\u00E7\u00E3o de malware antes de iniciar este pacote. "Usar padr\u00E3o global" segue o que voc\u00EA definiu em Configura\u00E7\u00F5es \u2192 Avan\u00E7ado. Desative apenas se voc\u00EA confiar na fonte \u2013 a verifica\u00E7\u00E3o \u00E9 a \u00FAltima linha de defesa do inicializador contra mods adulterados.
modal.advanced.verifyNow=Verifique este pacote agora
modal.advanced.verifyNow.hint=Refaz o hash de cada mod, biblioteca e ativo no manifesto do pacote. Repara qualquer coisa corrompida. Leva de alguns segundos a alguns minutos, dependendo do tamanho da embalagem.
modal.advanced.removeOfficial.hint=Este pacote j\u00E1 foi exportado para o Minecraft Launcher oficial. Remover aqui exclui o perfil + o diret\u00F3rio do jogo exportado; sua instala\u00E7\u00E3o do Mica n\u00E3o \u00E9 afetada.
modal.advanced.addOfficial.hint=Cria um perfil em seu Minecraft Launcher oficial que aponta para os mods e configura\u00E7\u00F5es deste pacote (as vers\u00F5es Vanilla recebem uma entrada apenas de perfil \u2013 nenhuma c\u00F3pia \u00E9 necess\u00E1ria). Pacotes modificados podem instalar automaticamente o modloader correspondente durante a exporta\u00E7\u00E3o.
