crash.audio.summary=Minecraft no pudo inicializar el subsistema de audio. En Linux, esto suele ser una discrepancia entre PulseAudio \u2194 ALSA (especialmente en contenedores o instalaciones nuevas); en Windows suele ser un dispositivo de salida deshabilitado/desconectado. La m\u00FAsica y los sonidos tambi\u00E9n se pueden desactivar en el juego como soluci\u00F3n alternativa.
crash.audio.title=La inicializaci\u00F3n de audio fall\u00F3
crash.auth.summary=El juego rechaz\u00F3 el token de sesi\u00F3n que proporcion\u00F3 el lanzador. Normalmente el inicio de sesi\u00F3n guardado ha caducado; Cerrar sesi\u00F3n en el iniciador y volver a iniciar sesi\u00F3n lo aclara.
crash.auth.title=Minecraft no pudo autenticarse
crash.diskFull.summary=El sistema se qued\u00F3 sin espacio en disco a mitad del lanzamiento. Libere algo de espacio (los mundos modpack, las capturas de pantalla antiguas y los informes de fallos en la carpeta de instalaci\u00F3n del paquete suelen ser los mayores infractores) y vuelva a intentarlo.
crash.diskFull.title=disco lleno
crash.fileLock.summary=Un archivo que el juego intent\u00F3 escribir fue bloqueado por otro proceso. En Windows, esto casi siempre es un antivirus (o Windows Defender) que escanea el mod o el tiempo de ejecuci\u00F3n descargado; intente incluir en la lista blanca la carpeta de instalaci\u00F3n del iniciador y luego vuelva a intentar iniciarlo. Cerrar los clientes OneDrive/sincronizaci\u00F3n apuntados a la carpeta de instalaci\u00F3n es la otra soluci\u00F3n com\u00FAn.
crash.fileLock.title=Archivo bloqueado por otro proceso
crash.forgeDep.summary=El mod "{0}" necesita {1} {2} instalado, pero no se ha cargado una versi\u00F3n compatible. Agregue la dependencia que falta, actualice la existente a una versi\u00F3n coincidente o elimine el mod que la requiere.
crash.forgeDep.title=Dependencia de mod faltante o no coincidente
crash.gpu.summary=Minecraft no pudo inicializar la capa de gr\u00E1ficos. Las causas habituales son controladores de GPU desactualizados, la elecci\u00F3n de la GPU incorrecta en una computadora port\u00E1til con gr\u00E1ficos integrados y discretos, o sesiones de escritorio remoto donde OpenGL no est\u00E1 acelerado.
crash.gpu.title=La inicializaci\u00F3n de gr\u00E1ficos fall\u00F3
crash.javaVersion.manifestSuffix=La versi\u00F3n de Java requerida normalmente se declara en el manifiesto del modpack.
crash.javaVersion.summary=Se compil\u00F3 un mod o biblioteca en este paquete para una versi\u00F3n de Java m\u00E1s nueva que el tiempo de ejecuci\u00F3n que se utiliza actualmente{0}. La pantalla de administraci\u00F3n del tiempo de ejecuci\u00F3n del iniciador puede instalar o elegir un Java diferente.{1}
crash.javaVersion.targetSuffix=(este mod est\u00E1 dirigido a Java {0})
crash.javaVersion.title=La versi\u00F3n de Java no coincide
crash.jeiRei.summaryCollision=Un ID de receta colision\u00F3 entre dos mods, generalmente cuando dos mods registran el mismo identificador de receta, o cuando un mod de administraci\u00F3n de recetas (JEI / REI / CraftTweaker) carga recetas m\u00E1s r\u00E1pido de lo que los mods subyacentes las publican. La eliminaci\u00F3n de una de las modificaciones de gesti\u00F3n de recetas normalmente desbloquea el inicio.
crash.jeiRei.summaryDual=Se instalan tanto elementos suficientes (JEI) como elementos suficientes (REI). Registran los mismos ganchos del visor de recetas y uno de ellos fallar\u00E1 en cada lanzamiento. Elija uno: la mayor\u00EDa de los paquetes modernos usan REI en Fabric y JEI en Forge.
crash.jeiRei.titleCollision=Colisi\u00F3n de ID de receta
crash.jeiRei.titleDual=Conflicto JEI y REI
crash.mixin.culpritSuffix=- Mixin de "{0}" parece ser la culpable
crash.mixin.summary=No se pudo aplicar el parche mixin de un mod{0}. Por lo general, esto significa que dos mods est\u00E1n intentando parchear la misma clase o que uno de ellos a\u00FAn no es compatible con esta versi\u00F3n de Minecraft.
crash.mixin.title=Conflicto de mezcla de mods
crash.modLoading.summaryGeneric=Forge no pudo cargar las modificaciones de este paquete de manera limpia. Las causas m\u00E1s comunes son una dependencia faltante, un mod dirigido a una versi\u00F3n diferente de Minecraft/Forge o dos mods que no se llevan bien.
crash.modLoading.summaryWithClass=Un mod intent\u00F3 utilizar la clase "{0}" pero no se encontr\u00F3. Por lo general, eso significa que falta un mod de dependencia requerido o que se col\u00F3 un mod de una versi\u00F3n diferente de Minecraft/Forge.
crash.modLoading.title=Error al cargar el mod
crash.modMcMismatch.summary=Se cre\u00F3 un mod en este paquete para Minecraft {0} pero el paquete lanza Minecraft {1}. O baja la versi\u00F3n de Minecraft del paquete, cambia el mod por uno creado para {1} o elim\u00EDnalo.
crash.modMcMismatch.title=Mod creado para Minecraft {0}, el paquete se ejecuta {1}
crash.nativeLib.summary=La JVM no pudo cargar una de las bibliotecas nativas de Minecraft (normalmente LWJGL o un enlace JNI). Las causas habituales son un antivirus que pone el archivo en cuarentena, una instalaci\u00F3n da\u00F1ada o, en Linux, una biblioteca del sistema faltante. Reinstalar el modpack suele solucionarlo.
crash.nativeLib.title=No se pudo cargar una biblioteca nativa
crash.oom.detailSuffix=({0})
