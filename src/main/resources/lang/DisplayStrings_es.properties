settings.fxml.modernMinecraftVersions=Las versiones modernas de Minecraft utilizan las distribuciones de tiempo de ejecuci\u00F3n Java oficiales de Mojang. Legacy Forge (Minecraft 1.12.2 y versiones anteriores) utiliza Bell-SW Liberica JRE 8 para mayor compatibilidad.
