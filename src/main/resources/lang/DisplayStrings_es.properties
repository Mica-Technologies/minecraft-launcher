settings.fxml.whenEnabledQuot=Cuando est\u00E9 habilitado, &quot;Instalar en el Iniciador&quot; enlaces en el sitio web y en Discord &quot;Unirse al juego&quot; Los botones abren este iniciador y agregan o inician el modpack vinculado. Los hosts que no son de confianza siempre requieren un clic de confirmaci\u00F3n antes de instalarse.
