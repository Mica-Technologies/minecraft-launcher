modal.advanced.hint=Controles de usuario avanzado por paquete. Los valores predeterminados est\u00E1n bien para la mayor\u00EDa de los usuarios.
modal.advanced.alwaysVerify=Verifique siempre los archivos del juego al iniciar
modal.advanced.alwaysVerify.hint=Cuando est\u00E1 desactivado (predeterminado), el iniciador omite la repetici\u00F3n de archivos hash que no han cambiado desde la \u00FAltima verificaci\u00F3n exitosa, lo que hace que los inicios posteriores sean notablemente m\u00E1s r\u00E1pidos. Act\u00EDvelo si ha tenido problemas con archivos corruptos o desea realizar una verificaci\u00F3n estricta de integridad en todo momento.
modal.advanced.scanFreq.label=Frecuencia de escaneo de seguridad
modal.advanced.scanFreq.hint=Con qu\u00E9 frecuencia ejecutar el an\u00E1lisis de malware antes de iniciar este paquete. "Usar valor predeterminado global" sigue lo que hayas configurado en Configuraci\u00F3n \u2192 Avanzado. Desact\u00EDvelo solo si conf\u00EDa en la fuente: el escaneo es la \u00FAltima l\u00EDnea de defensa del iniciador contra modificaciones manipuladas.
modal.advanced.verifyNow=Verifica este paquete ahora
modal.advanced.verifyNow.hint=Vuelve a comparar cada mod, biblioteca y activo con el manifiesto del paquete. Repara cualquier cosa corrupta. Tarda entre unos segundos y un par de minutos, seg\u00FAn el tama\u00F1o del paquete.
modal.advanced.removeOfficial.hint=Este paquete ya est\u00E1 exportado al lanzador oficial de Minecraft. Al eliminar aqu\u00ED se elimina el perfil + el directorio del juego exportado; su instalaci\u00F3n de Mica no se ve afectada.
modal.advanced.addOfficial.hint=Crea un perfil en su iniciador oficial de Minecraft que apunta a las modificaciones y configuraciones de este paquete (las versiones b\u00E1sicas obtienen una entrada solo de perfil, no se necesita copia). Los paquetes modificados pueden instalar autom\u00E1ticamente el cargador de mods correspondiente durante la exportaci\u00F3n.
modal.ack.heading=Hallazgos de escaneo reconocidos
modal.ack.intro=El responsable del paquete ha marcado estos resultados del an\u00E1lisis espec\u00EDficos como conocidos y correctos para que el iniciador no los bloquee. El an\u00E1lisis a\u00FAn se ejecuta en cada archivo: solo se silencian las combinaciones enumeradas (archivo + regla + ubicaci\u00F3n), y una actualizaci\u00F3n de mod que cambia el contenido del archivo invalida autom\u00E1ticamente la entrada.
