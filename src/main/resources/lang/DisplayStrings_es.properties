settings.fxml.minecraftIsA=Minecraft es una marca comercial de Mojang Synergies AB y Microsoft Corporation. Este lanzador utiliza el nombre de Minecraft \u00FAnicamente para identificar el juego que lanza y no est\u00E1 afiliado, respaldado, patrocinado ni aprobado espec\u00EDficamente por Mojang AB o Microsoft.
