settings.fxml.showWhatYou=Muestra lo que est\u00E1s jugando en tu perfil de Discord. Requiere que la aplicaci\u00F3n de escritorio Discord se ejecute en la misma m\u00E1quina: el iniciador se comunica con ella localmente a trav\u00E9s de IPC, no se requiere token ni inicio de sesi\u00F3n.
settings.fxml.friendInvites=Amiga invita
settings.fxml.allowDiscordInvites=Permitir invitaciones de Discord
settings.fxml.whenEnabledFriends=Cuando est\u00E1 habilitado, los amigos que ven tu estado de Discord mientras est\u00E1s en el juego obtienen un mensaje "Unirse al juego". bot\u00F3n en su perfil que instala autom\u00E1ticamente e inicia el mismo modpack en su m\u00E1quina. Desactiva solo el bot\u00F3n de unirse; la rica presencia en s\u00ED se controla mediante el interruptor de arriba.
settings.fxml.youCanAlso=Tambi\u00E9n puedes hacer clic con el bot\u00F3n derecho en cualquier tarjeta de modpack en el men\u00FA principal y seleccionar "Copiar enlace de invitaci\u00F3n de Discord". para compartir la URL para unirse directamente en cualquier chat.
settings.fxml.rgbLighting=Iluminaci\u00F3n RGB
settings.fxml.lightingBackend=Parte trasera de iluminaci\u00F3n
settings.fxml.enableRgbLighting=Habilitar iluminaci\u00F3n RGB
settings.fxml.whenEnabledThe=Cuando est\u00E1 habilitado, el iniciador ilumina el teclado compatible con colores derivados del modpack durante la reproducci\u00F3n. Desactivado predeterminado: habilite solo cuando desee que el iniciador se comunique con sus dispositivos perif\u00E9ricos.
settings.fxml.backend=Parte trasera:
settings.fxml.disabled=Desactivada
settings.fxml.autoRunsEvery=Auto ejecuta todos los backends habilitados a continuaci\u00F3n que tengan hardware disponible, por lo que una plataforma mixta (por ejemplo, ventiladores Razer + un teclado Windows Dynamic Lighting) ilumina todo a la vez. Elija un backend espec\u00EDfico para forzar solo ese.
settings.fxml.autoModeIntegrations=Integraciones en modo autom\u00E1tico:
settings.fxml.openrgb=AbiertoRGB
settings.fxml.razerChromaNative=Razer Chroma (SDK nativo)
settings.fxml.windowsDynamicLighting=Iluminaci\u00F3n din\u00E1mica de ventanas
settings.fxml.corsairIcue=Corsario iCUE
settings.fxml.asusAuraLegacy=ASUS Aura (SDK heredado)
settings.fxml.razerChromaRest=Razer Chroma (REST \u2013 heredado)
settings.fxml.turnOffThe=Desactive las integraciones que no desea que alcance el iniciador, incluso si su software est\u00E1 instalado. Est\u00E1 desactivado de forma predeterminada para Chroma REST, ya que el SDK nativo lo reemplaza en cualquier instalaci\u00F3n de Synapse que funcione.
settings.fxml.menuEffect=Efecto de men\u00FA
settings.fxml.lightUpDevices=Iluminar dispositivos en men\u00FAs
settings.fxml.whenOnYour=Cuando est\u00E1 activado, tus dispositivos se iluminan mientras est\u00E1s en los men\u00FAs de inicio, usando el color de acento del tema activo. Al abrir la vista detallada de un modpack se cambia a los colores de muestra de ese modpack. Cuando est\u00E1n apagados, los dispositivos permanecen apagados entre los lanzamientos del juego.
settings.fxml.animationStyle=Estilo de animaci\u00F3n
settings.fxml.solidSingleSteady=S\u00F3lido: color \u00FAnico y estable. Respirar: aparici\u00F3n y desaparici\u00F3n gradual lenta (predeterminado). Pulso: pulso m\u00E1s r\u00E1pido entre el acento y su complemento. Ciclo: bucle suave a trav\u00E9s de 3-4 colores: muestra del logotipo del modpack cuando un paquete est\u00E1 enfocado; de lo contrario, tonos an\u00E1logos alrededor del acento del tema. Arco iris: barrido continuo de tonos en todo el espectro, sin dependencia del paquete.
settings.fxml.inGameEffects=Efectos del juego
settings.fxml.useModpackColors=Usar colores de modpack
settings.fxml.lightUpThe=Ilumina el teclado con colores tomados del logotipo del modpack en ejecuci\u00F3n. Cuando est\u00E1n desactivados, los efectos utilizan la paleta de acento del tema del iniciador.
settings.fxml.highlightMinecraftKeys=Resaltar las claves de Minecraft
settings.fxml.overlayWasdE=Superponga WASD / E / Q / F / Espacio / Shift / Ctrl con un acento contrastante sobre el fondo de color del modpack, para que las teclas del juego se destaquen de un vistazo.
settings.fxml.test=Prueba
settings.fxml.flashesSolidMagenta=Parpadea en magenta s\u00F3lido (RGB 255, 0, 255) en cada dispositivo conectado durante 2 segundos y luego restaura el efecto anterior. Un destello constante y de brillo total confirma que el backend est\u00E1 llegando a su hardware. Nota para Razer Chroma: Chroma Connect solo reenv\u00EDa fotogramas a dispositivos de terceros (ventiladores de caja, tiras, etc.) cuando tambi\u00E9n est\u00E1 conectado un dispositivo Razer principal (teclado, mouse o alfombrilla para mouse). Si solo esos dispositivos de terceros parpadean o permanecen oscuros, conecte un teclado/rat\u00F3n Razer y vuelva a intentarlo. El parpadeo con un dispositivo principal presente generalmente significa que otra aplicaci\u00F3n RGB (Synapse, iCUE, Signal RGB) est\u00E1 luchando por el dispositivo.
settings.fxml.testConnection=Conexi\u00F3n de prueba
