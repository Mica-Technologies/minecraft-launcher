preview.technic.sourceLabel=Fuente: T\u00E9cnica
preview.technic.note=La API de Technic requiere un cliente autenticado para el acceso program\u00E1tico, por lo que este iniciador a\u00FAn no puede importar paquetes directamente desde la plataforma Technic. La soluci\u00F3n alternativa:
preview.technic.step1=1. Abra la p\u00E1gina del proyecto a continuaci\u00F3n.
preview.technic.step2=2. Busque el enlace "Descarga del servidor" en la p\u00E1gina del paquete y descargue el ZIP del servidor.
preview.technic.step3=3. De vuelta en este iniciador, haga clic en "Importar ZIP" en la pantalla de exploraci\u00F3n y seleccione el ZIP descargado. El iniciador reconocer\u00E1 el formato del paquete de servidor Technic y lo configurar\u00E1 por usted.
