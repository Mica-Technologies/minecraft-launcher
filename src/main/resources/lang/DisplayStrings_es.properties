settings.fxml.howOftenThe=Con qu\u00E9 frecuencia se ejecuta el an\u00E1lisis de malware antes del lanzamiento. Se recomienda diariamente: detecta los cambios de manifiesto de inmediato y, de lo contrario, se ejecuta como m\u00E1ximo una vez al d\u00EDa para que los lanzamientos sean r\u00E1pidos. Los paquetes individuales pueden anular esto en su secci\u00F3n Avanzado.
