settings.fxml.showWhatYou=Muestra lo que est\u00E1s jugando en tu perfil de Discord. Requiere que la aplicaci\u00F3n de escritorio Discord se ejecute en la misma m\u00E1quina: el iniciador se comunica con ella localmente a trav\u00E9s de IPC, no se requiere token ni inicio de sesi\u00F3n.
settings.fxml.friendInvites=Amiga invita
settings.fxml.allowDiscordInvites=Permitir invitaciones de Discord
settings.fxml.whenEnabledFriends=Cuando est\u00E1 habilitado, los amigos que ven tu estado de Discord mientras est\u00E1s en el juego obtienen un mensaje "Unirse al juego". bot\u00F3n en su perfil que instala autom\u00E1ticamente e inicia el mismo modpack en su m\u00E1quina. Desactiva solo el bot\u00F3n de unirse; la rica presencia en s\u00ED se controla mediante el interruptor de arriba.
settings.fxml.youCanAlso=Tambi\u00E9n puedes hacer clic con el bot\u00F3n derecho en cualquier tarjeta de modpack en el men\u00FA principal y seleccionar "Copiar enlace de invitaci\u00F3n de Discord". para compartir la URL para unirse directamente en cualquier chat.
