preview.curseforge.note=CurseForge requiere una clave API para descargas program\u00E1ticas, por lo que el iniciador no puede importar sus paquetes directamente todav\u00EDa. Por ahora, puede abrir la p\u00E1gina del proyecto a continuaci\u00F3n, descargar el modpack ZIP de CurseForge y volver a empaquetarlo como un manifiesto de Mica o esperar la pr\u00F3xima actualizaci\u00F3n del iniciador que agregue soporte de importaci\u00F3n de CurseForge.
