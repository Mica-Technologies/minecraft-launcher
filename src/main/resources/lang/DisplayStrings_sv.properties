crash.nativeLib.summary=JVM kunde inte ladda ett av Minecrafts ursprungliga bibliotek (vanligtvis LWJGL eller en JNI-bindning). De vanliga orsakerna \u00E4r ett antivirus som s\u00E4tter filen i karant\u00E4n, en skadad installation eller - p\u00E5 Linux - ett saknat systembibliotek. Att installera om modpacket brukar fixa det.
