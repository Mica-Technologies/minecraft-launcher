crash.jeiRei.summaryCollision=Ett recept-ID kolliderade mellan tv\u00E5 mods - vanligtvis n\u00E4r tv\u00E5 mods registrerar samma receptidentifierare, eller n\u00E4r en recepthanteringsmod (JEI / REI / CraftTweaker) laddar recept snabbare \u00E4n de underliggande moddarna publicerar dem. Att ta bort en av mods f\u00F6r recepthantering avblockerar vanligtvis lanseringen.
crash.jeiRei.summaryDual=B\u00E5de Just Enough Items (JEI) och Roughly Enough Items (REI) \u00E4r installerade. De registrerar samma recept-visare krokar och en av dem kommer att misslyckas vid varje lansering. V\u00E4lj en \u2014 de flesta moderna paket anv\u00E4nder REI p\u00E5 tyg och JEI p\u00E5 Forge.
