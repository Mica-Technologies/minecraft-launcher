crash.modLoading.summaryGeneric=Forge kunde inte ladda detta pakets mods rent. De vanligaste orsakerna \u00E4r ett saknat beroende, en mod som riktar sig till en annan Minecraft/Forge-version, eller tv\u00E5 moddar som inte kommer \u00F6verens.
crash.modLoading.summaryWithClass=En mod f\u00F6rs\u00F6kte anv\u00E4nda klassen "{0}" men den hittades inte. Det betyder vanligtvis att en n\u00F6dv\u00E4ndig beroendemod saknas eller att en mod fr\u00E5n en annan Minecraft/Forge-version sm\u00F6g sig in.
crash.modLoading.title=Modladdning misslyckades
crash.modMcMismatch.summary=En mod i detta paket byggdes f\u00F6r Minecraft {0} men paketet lanserar Minecraft {1}. Antingen nedgradera paketets Minecraft-version, byt ut modden mot en byggd f\u00F6r {1} eller ta bort den.
