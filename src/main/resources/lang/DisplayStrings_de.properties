tooltip.settings.discordInvites=Im Spiel sehen Freunde in Ihrem Discord-Status die Schaltfl\u00E4che \u201ESpiel beitreten\u201C, mit der dasselbe Modpack auf ihrem Computer installiert und gestartet wird.
