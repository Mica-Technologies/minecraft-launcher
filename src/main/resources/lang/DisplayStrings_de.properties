settings.fxml.howOftenThe=Wie oft wird der Malware-Scan vor dem Start ausgef\u00FChrt? T\u00E4glich wird empfohlen \u2013 Manifest\u00E4nderungen werden sofort erfasst und ansonsten h\u00F6chstens einmal pro Tag ausgef\u00FChrt, sodass die Starts schnell erfolgen. Einzelne Pakete k\u00F6nnen dies in ihrem Abschnitt \u201EErweitert\u201C \u00FCberschreiben.
