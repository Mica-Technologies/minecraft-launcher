tooltip.settings.batteryThrottle=Verlangsamt Downloads auf Laptops im Akkubetrieb, um Strom zu sparen. Desktops und Ger\u00E4te mit Wechselstrom werden niemals gedrosselt.
tooltip.settings.theme=W\u00E4hlen Sie das visuelle Thema des Launchers. Automatisch entspricht Ihrer Betriebssystemeinstellung.
