preview.technic.sourceLabel=Quelle: Technik
preview.technic.note=Die API von Technic erfordert einen authentifizierten Client f\u00FCr den programmgesteuerten Zugriff, daher kann dieser Launcher Pakete noch nicht direkt von der Technic-Plattform importieren. Die Problemumgehung:
preview.technic.step1=1. \u00D6ffnen Sie die Projektseite unten.
preview.technic.step2=2. Suchen Sie auf der Seite des Pakets nach dem Link \u201EServer-Download\u201C und laden Sie die Server-ZIP-Datei herunter.
preview.technic.step3=3. Klicken Sie in diesem Launcher auf dem Durchsuchen-Bildschirm auf \u201EZIP importieren\u201C und w\u00E4hlen Sie die heruntergeladene ZIP-Datei aus. Der Launcher erkennt das Technic-Server-Pack-Format und richtet es f\u00FCr Sie ein.
