crash.audio.summary=Minecraft konnte das Audio-Subsystem nicht initialisieren. Unter Linux handelt es sich normalerweise um eine Diskrepanz zwischen PulseAudio und ALSA (insbesondere in Containern oder Neuinstallationen); Unter Windows handelt es sich normalerweise um ein deaktiviertes/nicht verbundenes Ausgabeger\u00E4t. Um dieses Problem zu umgehen, k\u00F6nnen Musik und Sounds auch im Spiel ausgeschaltet werden.
crash.audio.title=Die Audioinitialisierung ist fehlgeschlagen
crash.auth.summary=Das Spiel hat das vom Launcher bereitgestellte Sitzungstoken abgelehnt. Normalerweise ist der gespeicherte Login abgelaufen; Durch Abmelden vom Launcher und erneutes Anmelden wird das Problem behoben.
crash.auth.title=Minecraft konnte sich nicht authentifizieren
crash.diskFull.summary=Dem System ging w\u00E4hrend des Starts der Speicherplatz aus. Geben Sie etwas Speicherplatz frei \u2013 Modpack-Welten, alte Screenshots und Absturzberichte im Installationsordner des Pakets sind normalerweise die gr\u00F6\u00DFten \u00DCbelt\u00E4ter \u2013 und versuchen Sie es erneut.
crash.diskFull.title=Festplatte voll
crash.fileLock.summary=Eine Datei, die das Spiel zu schreiben versuchte, wurde durch einen anderen Prozess gesperrt. Unter Windows ist dies fast immer ein Antivirenprogramm (oder Windows Defender), das den heruntergeladenen Mod oder die heruntergeladene Laufzeit scannt \u2013 versuchen Sie, den Installationsordner des Launchers auf die Whitelist zu setzen, und versuchen Sie dann den Start erneut. Das Schlie\u00DFen von OneDrive-/Synchronisierungsclients, die auf den Installationsordner verweisen, ist die andere h\u00E4ufige L\u00F6sung.
crash.fileLock.title=Datei durch einen anderen Prozess gesperrt
crash.forgeDep.summary=F\u00FCr den Mod \u201E{0}\u201C muss {1} {2} installiert sein, es ist jedoch keine kompatible Version geladen. F\u00FCgen Sie entweder die fehlende Abh\u00E4ngigkeit hinzu, aktualisieren Sie die vorhandene auf eine passende Version oder entfernen Sie den Mod, der sie erfordert.
crash.forgeDep.title=Fehlende oder nicht \u00FCbereinstimmende Mod-Abh\u00E4ngigkeit
crash.gpu.summary=Minecraft konnte die Grafikebene nicht initialisieren. Die h\u00E4ufigsten Ursachen sind veraltete GPU-Treiber, die Wahl der falschen GPU auf einem Laptop mit integrierter und separater Grafik oder Remote-Desktop-Sitzungen, bei denen OpenGL nicht beschleunigt wird.
crash.gpu.title=Die Grafikinitialisierung ist fehlgeschlagen
crash.javaVersion.manifestSuffix=Die erforderliche Java-Version wird normalerweise durch das Modpack-Manifest deklariert.
crash.javaVersion.summary=Ein Mod oder eine Bibliothek in diesem Paket wurde f\u00FCr eine neuere Java-Version als die derzeit verwendete Laufzeit kompiliert{0}. Der Laufzeitverwaltungsbildschirm des Launchers kann ein anderes Java installieren oder ausw\u00E4hlen.{1}
crash.javaVersion.targetSuffix=(Dieser Mod zielt auf Java {0} ab)
crash.javaVersion.title=Nicht\u00FCbereinstimmung der Java-Version
crash.jeiRei.summaryCollision=Eine Rezept-ID ist zwischen zwei Mods kollidiert \u2013 typischerweise, wenn zwei Mods dieselbe Rezept-ID registrieren oder wenn ein Rezeptverwaltungs-Mod (JEI / REI / CraftTweaker) Rezepte schneller l\u00E4dt, als die zugrunde liegenden Mods sie ver\u00F6ffentlichen. Durch das Entfernen eines der Rezeptverwaltungs-Mods wird die Startsperre normalerweise aufgehoben.
crash.jeiRei.summaryDual=Es sind sowohl Just Enough Items (JEI) als auch Roughly Enough Items (REI) installiert. Sie registrieren die gleichen Rezept-Viewer-Hooks und einer von ihnen schl\u00E4gt bei jedem Start fehl. W\u00E4hlen Sie eines aus \u2013 die meisten modernen Pakete verwenden REI f\u00FCr Fabric und JEI f\u00FCr Forge.
crash.jeiRei.titleCollision=Kollision mit der Rezept-ID
crash.jeiRei.titleDual=JEI- und REI-Konflikt
crash.mixin.culpritSuffix=\u2013 Mixin von \u201E{0}\u201C scheint der \u00DCbelt\u00E4ter zu sein
crash.mixin.summary=Der Mixin-Patch eines Mods konnte nicht angewendet werden{0}. Dies bedeutet normalerweise, dass zwei Mods versuchen, dieselbe Klasse zu patchen, oder dass einer von ihnen diese Minecraft-Version noch nicht unterst\u00FCtzt.
crash.mixin.title=Mod-Mixin-Konflikt
crash.modLoading.summaryGeneric=Forge konnte die Mods dieses Pakets nicht sauber laden. Die h\u00E4ufigsten Ursachen sind eine fehlende Abh\u00E4ngigkeit, ein Mod, der auf eine andere Minecraft-/Forge-Version abzielt, oder zwei Mods, die nicht miteinander harmonieren.
crash.modLoading.summaryWithClass=Ein Mod hat versucht, die Klasse \u201E{0}\u201C zu verwenden, aber sie wurde nicht gefunden. Das bedeutet normalerweise, dass ein erforderlicher Abh\u00E4ngigkeits-Mod fehlt oder sich ein Mod aus einer anderen Minecraft-/Forge-Version eingeschlichen hat.
crash.modLoading.title=Das Laden der Mod ist fehlgeschlagen
crash.modMcMismatch.summary=Ein Mod in diesem Paket wurde f\u00FCr Minecraft {0} erstellt, aber das Paket startet Minecraft {1}. Entweder ein Downgrade der Minecraft-Version des Pakets durchf\u00FChren, den Mod gegen einen f\u00FCr {1} austauschen oder ihn entfernen.
crash.modMcMismatch.title=Mod erstellt f\u00FCr Minecraft {0}, Pack l\u00E4uft {1}
crash.nativeLib.summary=Die JVM konnte eine der nativen Bibliotheken von Minecraft (normalerweise LWJGL oder eine JNI-Bindung) nicht laden. Die h\u00E4ufigsten Ursachen sind ein Antivirenprogramm, das die Datei isoliert, eine besch\u00E4digte Installation oder \u2013 unter Linux \u2013 eine fehlende Systembibliothek. Eine Neuinstallation des Modpacks behebt das Problem normalerweise.
crash.nativeLib.title=Eine native Bibliothek konnte nicht geladen werden
crash.oom.detailSuffix=({0})
crash.oom.increaseRam=Erh\u00F6hen Sie den maximalen RAM auf {0} GB
crash.oom.openRamSettings=\u00D6ffnen Sie die RAM-Einstellungen
crash.oom.summary=Minecraft hat nicht mehr gen\u00FCgend Speicher{0}. Der maximale RAM Ihres Launchers betr\u00E4gt derzeit {1} GB; Dieses Paket braucht mehr.
crash.oom.systemTotal=Ihr System verf\u00FCgt insgesamt \u00FCber etwa {0} GB.
crash.oom.title=Kein Speicher mehr
crash.optifineSodium.summary=Sowohl OptiFine als auch Natrium sind installiert. Sie patchen dieselben Minecraft-Rendering-Interna auf inkompatible Weise und k\u00F6nnen nicht sicher nebeneinander existieren \u2013 w\u00E4hlen Sie eines aus. Natrium ben\u00F6tigt den Stofflader; OptiFine funktioniert auf Forge oder mit der OptiFabric-Br\u00FCcke. Die Schaltfl\u00E4chen \u201EDeaktivieren\u201C unten benennen eines der beiden JARs in \u201E{name}.jar.disabled\u201C um, sodass der Loader es beim n\u00E4chsten Start \u00FCberspringt.
crash.optifineSodium.title=OptiFine und Natrium sind nicht kompatibel
