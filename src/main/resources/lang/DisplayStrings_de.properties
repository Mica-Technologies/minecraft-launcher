settings.fxml.autoRunsEvery=Automatisch f\u00FChrt jedes aktivierte Backend unten aus, das \u00FCber verf\u00FCgbare Hardware verf\u00FCgt, sodass ein gemischtes Rig (z. B. Razer-L\u00FCfter + eine Windows Dynamic Lighting-Tastatur) alles auf einmal beleuchtet. W\u00E4hlen Sie stattdessen ein bestimmtes Backend aus, um nur dieses zu erzwingen.
