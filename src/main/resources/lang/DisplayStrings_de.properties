modal.advanced.hint=Power-User-Steuerelemente pro Paket. Die Standardeinstellungen sind f\u00FCr die meisten Benutzer in Ordnung.
modal.advanced.alwaysVerify=\u00DCberpr\u00FCfen Sie beim Start immer die Spieledateien
modal.advanced.alwaysVerify.hint=Wenn diese Option deaktiviert ist (Standardeinstellung), \u00FCberspringt der Launcher das erneute Hashen von Dateien, die sich seit der letzten erfolgreichen \u00DCberpr\u00FCfung nicht ge\u00E4ndert haben, wodurch nachfolgende Starts sp\u00FCrbar schneller werden. Aktivieren Sie diese Option, wenn Sie Probleme mit besch\u00E4digten Dateien hatten oder jedes Mal eine strenge Integrit\u00E4tspr\u00FCfung durchf\u00FChren m\u00F6chten.
modal.advanced.scanFreq.label=H\u00E4ufigkeit von Sicherheitsscans
modal.advanced.scanFreq.hint=Wie oft soll der Malware-Scan ausgef\u00FChrt werden, bevor dieses Paket gestartet wird? \u201EGlobalen Standard verwenden\u201C richtet sich nach Ihren Einstellungen unter Einstellungen \u2192 Erweitert. Deaktivieren Sie die Funktion nur, wenn Sie der Quelle vertrauen \u2013 der Scan ist die letzte Verteidigungslinie des Launchers gegen manipulierte Mods.
modal.advanced.verifyNow=\u00DCberpr\u00FCfen Sie dieses Paket jetzt
modal.advanced.verifyNow.hint=Hasht jeden Mod, jede Bibliothek und jedes Asset erneut mit dem Manifest des Pakets. Repariert alles, was besch\u00E4digt ist. Dauert je nach Packungsgr\u00F6\u00DFe ein paar Sekunden bis ein paar Minuten.
modal.advanced.removeOfficial.hint=Dieses Paket ist bereits in den offiziellen Minecraft Launcher exportiert. Wenn Sie hier entfernen, werden das Profil und das exportierte Spielverzeichnis gel\u00F6scht. Ihre Mica-Installation ist davon nicht betroffen.
modal.advanced.addOfficial.hint=Erstellt ein Profil in Ihrem offiziellen Minecraft-Launcher, das auf die Mods und Konfigurationen dieses Pakets verweist (Vanilla-Versionen erhalten einen Nur-Profil-Eintrag \u2013 keine Kopie erforderlich). Modifizierte Pakete k\u00F6nnen den passenden Modloader beim Export automatisch installieren.
modal.ack.heading=Anerkannte Scan-Befunde
modal.ack.intro=The pack maintainer has marked these specific scan findings as known-OK so the launcher doesn't block on them. Der Scan wird weiterhin f\u00FCr jede Datei ausgef\u00FChrt \u2013 nur die aufgelisteten Kombinationen (Datei + Regel + Speicherort) werden stummgeschaltet, und ein Mod-Update, das den Inhalt der Datei \u00E4ndert, macht den Eintrag automatisch ung\u00FCltig.
modal.ack.noReason=(kein Grund vom Paketbetreuer angegeben)
