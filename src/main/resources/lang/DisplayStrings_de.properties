settings.fxml.reHashesEvery=Hasht jeden Mod, jede Bibliothek und jedes Asset in jedem installierten Paket erneut anhand seines Manifests. Repariert alles, was besch\u00E4digt ist. Dauert ein paar Sekunden pro Packung \u2013 gro\u00DFe Bibliotheken k\u00F6nnen insgesamt ein paar Minuten laufen.
