settings.fxml.whenEnabledFriends=Wenn diese Option aktiviert ist, erhalten Freunde, die Ihren Discord-Status sehen, w\u00E4hrend Sie im Spiel sind, die Meldung \u201ESpiel beitreten\u201C. Schaltfl\u00E4che in Ihrem Profil, die das gleiche Modpack automatisch auf ihrem Computer installiert und startet. Deaktiviert nur die Schaltfl\u00E4che \u201EBeitreten\u201C \u2013 die umfangreiche Pr\u00E4senz selbst wird durch den Schalter oben gesteuert.
settings.fxml.youCanAlso=Sie k\u00F6nnen auch mit der rechten Maustaste auf eine beliebige Modpack-Karte im Hauptmen\u00FC klicken und \u201EDiscord-Einladungslink kopieren\u201C ausw\u00E4hlen. um die Beitritts-URL direkt in einem beliebigen Chat zu teilen.
settings.fxml.rgbLighting=RGB-Beleuchtung
