settings.fxml.turnOffThe=Deaktivieren Sie die Integrationen, die der Launcher nicht erreichen soll, auch wenn deren Software installiert ist. Standardm\u00E4\u00DFig deaktiviert f\u00FCr Chroma REST, da das native SDK es bei jeder funktionierenden Synapse-Installation ersetzt.
settings.fxml.menuEffect=Men\u00FCeffekt
settings.fxml.lightUpDevices=Beleuchten Sie Ger\u00E4te in Men\u00FCs
settings.fxml.whenOnYour=Wenn diese Option aktiviert ist, leuchten Ihre Ger\u00E4te auf, w\u00E4hrend Sie sich in den Launcher-Men\u00FCs befinden, und verwenden dabei die Akzentfarbe des aktiven Themes. Wenn Sie die Detailansicht eines Modpacks \u00F6ffnen, wechseln Sie zu den Beispielfarben dieses Modpacks. Wenn diese Option deaktiviert ist, bleiben die Ger\u00E4te zwischen Spielstarts dunkel.
settings.fxml.animationStyle=Animationsstil
settings.fxml.solidSingleSteady=Einfarbig: einzelne, gleichm\u00E4\u00DFige Farbe. Atmen: langsames Ein- und Ausblenden (Standard). Puls: schnellerer Puls zwischen dem Akzent und seinem Komplement. Zyklus: sanfter Durchlauf durch 3\u20134 Farben \u2013 entnommen aus dem Modpack-Logo, wenn ein Paket im Fokus ist, ansonsten analoge Farbt\u00F6ne rund um den Themenakzent. Regenbogen: Kontinuierlicher Farbtondurchlauf \u00FCber das gesamte Spektrum, keine Paketabh\u00E4ngigkeit.
settings.fxml.inGameEffects=Effekte im Spiel
settings.fxml.useModpackColors=Verwenden Sie Modpack-Farben
settings.fxml.lightUpThe=Beleuchten Sie die Tastatur in Farben, die dem Logo des laufenden Modpacks entnommen sind. Wenn diese Option deaktiviert ist, verwenden Effekte die Akzentpalette des Launcher-Designs.
settings.fxml.highlightMinecraftKeys=Markieren Sie Minecraft-Schl\u00FCssel
settings.fxml.overlayWasdE=\u00DCberlagern Sie WASD / E / Q / F / Leertaste / Umschalttaste / Strg mit einem kontrastierenden Akzent \u00FCber dem Modpack-Farbhintergrund, damit die Gameplay-Tasten auf einen Blick hervorstechen.
settings.fxml.test=Pr\u00FCfen
settings.fxml.flashesSolidMagenta=Blinkt auf jedem angeschlossenen Ger\u00E4t 2 Sekunden lang durchgehend magentafarben (RGB 255, 0, 255) und stellt dann den vorherigen Effekt wieder her. Ein stetiges Blinken in voller Helligkeit best\u00E4tigt, dass das Backend Ihre Hardware erreicht. Hinweis f\u00FCr Razer Chroma: Chroma Connect leitet Frames nur an Ger\u00E4te von Drittanbietern (Geh\u00E4usel\u00FCfter, Leisten usw.) weiter, wenn auch ein prim\u00E4res Razer-Ger\u00E4t \u2013 Tastatur, Maus oder Mauspad \u2013 angeschlossen ist. Wenn nur diese Drittanbieterger\u00E4te flackern oder dunkel bleiben, schlie\u00DFen Sie eine Razer-Tastatur/-Maus an und versuchen Sie es erneut. Flackern bei vorhandenem Prim\u00E4rger\u00E4t bedeutet normalerweise, dass eine andere RGB-App (Synapse, iCUE, Signal RGB) um das Ger\u00E4t k\u00E4mpft.
