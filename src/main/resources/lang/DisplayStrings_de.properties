settings.fxml.enableRgbLighting=Aktivieren Sie RGB-Beleuchtung
settings.fxml.whenEnabledThe=Wenn diese Option aktiviert ist, beleuchtet der Launcher Ihre unterst\u00FCtzte Tastatur w\u00E4hrend des Spielens mit vom Modpack abgeleiteten Farben. Standardm\u00E4\u00DFig deaktiviert \u2013 aktivieren Sie die Option nur, wenn Sie m\u00F6chten, dass der Launcher mit Ihren Peripherieger\u00E4ten kommuniziert.
settings.fxml.backend=Backend:
