settings.fxml.curseforgeCoreApi=CurseForge Core API-Schl\u00FCssel. Erforderlich, um CurseForge-Modpacks per URL zu importieren. Holen Sie sich einen unter console.curseforge.com \u2192 Meine API-Schl\u00FCssel. Wird verschl\u00FCsselt auf diesem Computer gespeichert und verwendet dasselbe Schema, das Ihr Minecraft-Anmeldetoken sch\u00FCtzt \u2013 es verl\u00E4sst den Launcher nie im Klartext.
