preview.curseforge.note=CurseForge erfordert einen API-Schl\u00FCssel f\u00FCr programmatische Downloads, sodass der Launcher seine Pakete noch nicht direkt importieren kann. Vorerst k\u00F6nnen Sie die Projektseite unten \u00F6ffnen, das Modpack-ZIP von CurseForge herunterladen und es entweder als Mica-Manifest neu verpacken oder auf das n\u00E4chste Launcher-Update warten, das CurseForge-Importunterst\u00FCtzung hinzuf\u00FCgt.
