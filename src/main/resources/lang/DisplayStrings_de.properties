notification.import.technicServer.body=\u00D6ffnen Sie das Paket im Modpack-Editor, um die URL des Loader-Installationsprogramms festzulegen (und \u00FCberpr\u00FCfen Sie die automatisch erkannte Minecraft-Version + Mod-Loader), bevor Sie es starten.
