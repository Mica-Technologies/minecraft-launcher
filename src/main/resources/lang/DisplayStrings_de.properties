notification.import.modrinth.failed.body=Der Launcher hat Ihre URL als Modrinth-Modpack erkannt, konnte jedoch keine Details daf\u00FCr laden. \u00DCberpr\u00FCfen Sie Ihre Verbindung und versuchen Sie es erneut oder f\u00FCgen Sie stattdessen eine Mica-Manifest-URL ein.
