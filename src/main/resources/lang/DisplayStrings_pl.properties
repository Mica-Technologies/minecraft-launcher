settings.fxml.lightUpDevices=Pod\u015Bwietlaj urz\u0105dzenia w menu
settings.fxml.whenOnYour=Gdy ta opcja jest w\u0142\u0105czona, urz\u0105dzenia pod\u015Bwietlaj\u0105 si\u0119, gdy znajdujesz si\u0119 w menu programu uruchamiaj\u0105cego, wykorzystuj\u0105c kolor akcentuj\u0105cy aktywnego motywu. Otwarcie widoku szczeg\u00F3\u0142\u00F3w pakietu mod\u00F3w powoduje prze\u0142\u0105czenie na pr\u00F3bkowane kolory tego pakietu mod\u00F3w. Gdy jest wy\u0142\u0105czone, urz\u0105dzenia pozostaj\u0105 ciemne pomi\u0119dzy uruchomieniami gier.
settings.fxml.animationStyle=Styl animacji
settings.fxml.solidSingleSteady=Sta\u0142y: pojedynczy, sta\u0142y kolor. Oddech: powolne pojawianie si\u0119 i zanikanie (domy\u015Blne). Puls: szybszy puls pomi\u0119dzy akcentem a jego uzupe\u0142nieniem. Cykl: p\u0142ynna p\u0119tla przez 3-4 kolory \u2014 pr\u00F3bkowane z logo pakietu mod\u00F3w, gdy pakiet jest w centrum uwagi, w przeciwnym razie analogiczne odcienie wok\u00F3\u0142 akcentu tematycznego. T\u0119cza: ci\u0105g\u0142e przesuni\u0119cie odcienia w ca\u0142ym spektrum, brak zale\u017Cno\u015Bci od pakietu.
settings.fxml.inGameEffects=Efekty w grze
settings.fxml.useModpackColors=U\u017Cyj kolor\u00F3w modpack\u00F3w
settings.fxml.lightUpThe=Roz\u015Bwietl klawiatur\u0119 kolorami wzorowanymi na logo dzia\u0142aj\u0105cego pakietu mod\u00F3w. Gdy wy\u0142\u0105czone, efekty korzystaj\u0105 z palety akcent\u00F3w motywu programu uruchamiaj\u0105cego.
settings.fxml.highlightMinecraftKeys=Pod\u015Bwietl klawisze Minecrafta
settings.fxml.overlayWasdE=Na\u0142\u00F3\u017C WASD / E / Q / F / Space / Shift / Ctrl z kontrastowym akcentem na kolorowe t\u0142o pakietu mod\u00F3w, aby klawisze rozgrywki wyr\u00F3\u017Cnia\u0142y si\u0119 na pierwszy rzut oka.
settings.fxml.test=Test
settings.fxml.flashesSolidMagenta=Miga ci\u0105g\u0142ym magent\u0105 (RGB 255, 0, 255) na ka\u017Cdym pod\u0142\u0105czonym urz\u0105dzeniu przez 2 sekundy, a nast\u0119pnie przywraca poprzedni efekt. Sta\u0142y b\u0142ysk o pe\u0142nej jasno\u015Bci potwierdza, \u017Ce \u200B\u200Bbackend dociera do Twojego sprz\u0119tu. Uwaga dotycz\u0105ca Razer Chroma: Chroma Connect przekazuje ramki do urz\u0105dze\u0144 innych firm (wentylatory, paski itp.) tylko wtedy, gdy pod\u0142\u0105czone jest tak\u017Ce podstawowe urz\u0105dzenie Razer \u2014 klawiatura, mysz lub podk\u0142adka pod mysz. Je\u015Bli tylko urz\u0105dzenia innych firm migaj\u0105 lub pozostaj\u0105 ciemne, pod\u0142\u0105cz klawiatur\u0119/mysz Razer i spr\u00F3buj ponownie. Migotanie przy obecnym urz\u0105dzeniu g\u0142\u00F3wnym oznacza zwykle, \u017Ce inna aplikacja RGB (Synapse, iCUE, Signal RGB) walczy o to urz\u0105dzenie.
