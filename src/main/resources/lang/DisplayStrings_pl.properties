notification.import.technicServer.body=Otw\u00F3rz pakiet w Edytorze Modpack, aby ustawi\u0107 adres URL instalatora modu\u0142u \u0142aduj\u0105cego (i sprawd\u017A automatycznie wykryt\u0105 wersj\u0119 Minecrafta + modu\u0142 \u0142aduj\u0105cy mod) przed uruchomieniem.
