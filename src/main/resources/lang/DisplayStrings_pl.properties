settings.fxml.reHashesEvery=Ponownie hashuje ka\u017Cdy mod, bibliotek\u0119 i zas\u00F3b w ka\u017Cdym zainstalowanym pakiecie zgodnie z jego manifestem. Naprawia wszystko, co jest uszkodzone. Zajmuje kilka sekund na pakiet \u2014 du\u017Ce biblioteki mog\u0105 dzia\u0142a\u0107 \u0142\u0105cznie przez kilka minut.
