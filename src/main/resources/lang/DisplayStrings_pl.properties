notification.import.prism.success.body=\u201E{0}\u201D jest teraz w Twojej bibliotece wraz z skopiowanymi modami, konfiguracjami i \u015Bwiatami. Synchronizacja mod\u00F3w jest wy\u0142\u0105czona dla tego pakietu, wi\u0119c zaimportowane pliki pozostaj\u0105 na miejscu.
