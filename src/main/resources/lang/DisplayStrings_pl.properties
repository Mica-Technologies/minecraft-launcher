settings.fxml.fullLicenseTexts=Pe\u0142ne teksty licencji s\u0105 dostarczane z zainstalowanym programem uruchamiaj\u0105cym w folderze LICENSES i s\u0105 dost\u0119pne w repozytorium \u017Ar\u00F3d\u0142owym tego projektu.
