settings.fxml.minecraftTrademark=Znak towarowy Minecrafta
settings.fxml.minecraftIsA=Minecraft jest znakiem towarowym firm Mojang Synergies AB i Microsoft Corporation. Ten program uruchamiaj\u0105cy u\u017Cywa nazwy Minecraft wy\u0142\u0105cznie w celu identyfikacji uruchamianej przez siebie gry i nie jest z ni\u0105 powi\u0105zany, wspierany, sponsorowany ani specjalnie zatwierdzony przez Mojang AB lub Microsoft.
