settings.fxml.whenEnabledFriends=Je\u015Bli ta opcja jest w\u0142\u0105czona, znajomi, kt\u00F3rzy zobacz\u0105 Tw\u00F3j status na Discordzie, gdy jeste\u015B w grze, otrzymaj\u0105 opcj\u0119 \u201EDo\u0142\u0105cz do gry\u201D; przycisk na Twoim profilu, kt\u00F3ry automatycznie instaluje i uruchamia ten sam pakiet mod\u00F3w na ich komputerze. Wy\u0142\u0105cza tylko przycisk do\u0142\u0105czenia \u2014 sam\u0105 bogat\u0105 obecno\u015Bci\u0105 steruje si\u0119 za pomoc\u0105 prze\u0142\u0105cznika powy\u017Cej.
settings.fxml.youCanAlso=Mo\u017Cesz tak\u017Ce klikn\u0105\u0107 prawym przyciskiem myszy dowoln\u0105 kart\u0119 pakietu mod\u00F3w w menu g\u0142\u00F3wnym i wybra\u0107 opcj\u0119 \u201EKopiuj link zapraszaj\u0105cy na Discord\u201D. aby udost\u0119pni\u0107 adres URL do\u0142\u0105czenia bezpo\u015Brednio na dowolnym czacie.
