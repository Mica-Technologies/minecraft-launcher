settings.fxml.showWhatYou=Poka\u017C w co grasz na swoim profilu Discord. Wymaga, aby aplikacja komputerowa Discord dzia\u0142a\u0142a na tym samym komputerze \u2014 program uruchamiaj\u0105cy komunikuje si\u0119 z ni\u0105 lokalnie przez IPC, nie jest wymagany \u017Caden token ani login.
