settings.fxml.howOftenThe=Jak cz\u0119sto przed uruchomieniem uruchamiane jest skanowanie w poszukiwaniu z\u0142o\u015Bliwego oprogramowania. Zalecane jest codzienne \u2014 natychmiast wychwytuje widoczne zmiany, a w innych przypadkach uruchamia si\u0119 najwy\u017Cej raz dziennie, dzi\u0119ki czemu uruchamianie przebiega szybko. Poszczeg\u00F3lne pakiety mog\u0105 to zmieni\u0107 w sekcji Zaawansowane.
