modal.advanced.hint=Kontrole dla zaawansowanych u\u017Cytkownik\u00F3w w pakiecie. Warto\u015Bci domy\u015Blne s\u0105 wystarczaj\u0105ce dla wi\u0119kszo\u015Bci u\u017Cytkownik\u00F3w.
modal.advanced.alwaysVerify=Zawsze sprawdzaj pliki gry przy uruchomieniu
modal.advanced.alwaysVerify.hint=Gdy opcja jest wy\u0142\u0105czona (domy\u015Blnie), program uruchamiaj\u0105cy pomija ponowne hashowanie plik\u00F3w, kt\u00F3re nie uleg\u0142y zmianie od czasu ostatniej pomy\u015Blnej weryfikacji, co sprawia, \u017Ce \u200B\u200Bkolejne uruchomienia s\u0105 zauwa\u017Calnie szybsze. W\u0142\u0105cz t\u0119 opcj\u0119, je\u015Bli masz problemy z uszkodzonymi plikami lub chcesz za ka\u017Cdym razem dok\u0142adnie sprawdza\u0107 integralno\u015B\u0107.
modal.advanced.scanFreq.label=Cz\u0119stotliwo\u015B\u0107 skanowania bezpiecze\u0144stwa
modal.advanced.scanFreq.hint=Jak cz\u0119sto uruchamia\u0107 skanowanie w poszukiwaniu z\u0142o\u015Bliwego oprogramowania przed uruchomieniem tego pakietu. Opcja \u201EU\u017Cyj globalnych ustawie\u0144 domy\u015Blnych\u201D jest zgodna z ustawieniami ustawionymi w Ustawieniach \u2192 Zaawansowane. Wy\u0142\u0105cz tylko wtedy, gdy ufasz \u017Ar\u00F3d\u0142u \u2014 skanowanie jest ostatni\u0105 lini\u0105 obrony programu uruchamiaj\u0105cego przed zmodyfikowanymi modami.
modal.advanced.verifyNow=Sprawd\u017A teraz ten pakiet
modal.advanced.verifyNow.hint=Ponownie miesza ka\u017Cdy mod, bibliotek\u0119 i zas\u00F3b z manifestem pakietu. Naprawia wszystko, co jest uszkodzone. Trwa od kilku sekund do kilku minut, w zale\u017Cno\u015Bci od wielko\u015Bci opakowania.
modal.advanced.removeOfficial.hint=Ten pakiet zosta\u0142 ju\u017C wyeksportowany do oficjalnego programu uruchamiaj\u0105cego Minecraft. Usuni\u0119cie tutaj usuwa profil + wyeksportowany katalog gry; Twoja instalacja Mica pozostaje nienaruszona.
modal.advanced.addOfficial.hint=Tworzy profil w oficjalnym programie uruchamiaj\u0105cym Minecraft, kt\u00F3ry wskazuje modyfikacje i konfiguracje tego pakietu (wersje waniliowe maj\u0105 wpis dotycz\u0105cy tylko profilu \u2014 kopia nie jest potrzebna). Zmodyfikowane pakiety mog\u0105 automatycznie instalowa\u0107 pasuj\u0105cy modloader podczas eksportu.
modal.ack.heading=Potwierdzone wyniki skanowania
modal.ack.intro=Opiekun pakietu oznaczy\u0142 te konkretne wyniki skanowania jako znane - OK, wi\u0119c program uruchamiaj\u0105cy nie blokuje ich. Skanowanie nadal przebiega dla ka\u017Cdego pliku \u2014 tylko wymienione kombinacje (plik + regu\u0142a + lokalizacja) s\u0105 wyciszane, a aktualizacja moda, kt\u00F3ra zmienia zawarto\u015B\u0107 pliku, automatycznie uniewa\u017Cnia wpis.
