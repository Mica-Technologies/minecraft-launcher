tooltip.main.search=Pakiety filtr\u00F3w. Ka\u017Cde s\u0142owo oddzielone spacjami musi pasowa\u0107 gdzie\u015B w nazwie pakietu, wersji, wersji Minecrafta lub wersji Forge. Spr\u00F3buj \u201E1.12\u201D, \u201Eku\u017Ania\u201D lub \u201Ebiomy 1.12\u201D.
