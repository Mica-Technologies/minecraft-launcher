crash.optifineSodium.summary=Zainstalowane s\u0105 zar\u00F3wno OptiFine, jak i Sodium. \u0141ataj\u0105 te same elementy renderowania Minecrafta w niezgodny spos\u00F3b i nie mog\u0105 bezpiecznie wsp\u00F3\u0142istnie\u0107 \u2014 wybierz jedno. S\u00F3d potrzebuje \u0142adowarki Fabric; OptiFine dzia\u0142a na Forge lub z mostkiem OptiFabric. Poni\u017Csze przyciski Wy\u0142\u0105cz zmieniaj\u0105 nazw\u0119 jednego z dw\u00F3ch s\u0142oik\u00F3w na {nazwa}.jar.disabled, aby modu\u0142 \u0142aduj\u0105cy pomin\u0105\u0142 go przy nast\u0119pnym uruchomieniu.
