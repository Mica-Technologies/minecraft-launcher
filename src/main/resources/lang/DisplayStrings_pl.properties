settings.fxml.whenEnabledThe=Po w\u0142\u0105czeniu program uruchamiaj\u0105cy pod\u015Bwietla obs\u0142ugiwan\u0105 klawiatur\u0119 kolorami pochodz\u0105cymi z pakietu mod\u00F3w podczas gry. Domy\u015Blnie wy\u0142\u0105czone \u2014 w\u0142\u0105cz t\u0119 opcj\u0119 tylko wtedy, gdy chcesz, aby program uruchamiaj\u0105cy komunikowa\u0142 si\u0119 z urz\u0105dzeniami peryferyjnymi.
