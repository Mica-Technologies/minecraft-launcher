preview.technic.note=Interfejs API Technic wymaga uwierzytelnionego klienta w celu uzyskania dost\u0119pu programowego, wi\u0119c ten program uruchamiaj\u0105cy nie mo\u017Ce jeszcze importowa\u0107 pakiet\u00F3w bezpo\u015Brednio z Platformy Technic. Rozwi\u0105zanie:
preview.technic.step1=1. Otw\u00F3rz poni\u017Csz\u0105 stron\u0119 projektu.
preview.technic.step2=2. Poszukaj \u0142\u0105cza \u201EPobieranie serwera\u201D na stronie pakietu i pobierz plik ZIP serwera.
preview.technic.step3=3. Wr\u00F3\u0107 do tego programu uruchamiaj\u0105cego, kliknij \u201EImportuj ZIP\u201D na ekranie przegl\u0105dania i wybierz pobrany plik ZIP. Program uruchamiaj\u0105cy rozpozna format pakietu serwerowego Technic i skonfiguruje go za Ciebie.
