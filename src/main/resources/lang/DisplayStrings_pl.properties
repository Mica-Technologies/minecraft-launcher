preview.curseforge.note=CurseForge wymaga klucza API do programowego pobierania, wi\u0119c program uruchamiaj\u0105cy nie mo\u017Ce jeszcze bezpo\u015Brednio importowa\u0107 swoich pakiet\u00F3w. Na razie mo\u017Cesz otworzy\u0107 stron\u0119 projektu poni\u017Cej, pobra\u0107 pakiet mod\u00F3w ZIP z CurseForge i albo przepakowa\u0107 go jako manifest Mica, albo poczeka\u0107 na nast\u0119pn\u0105 aktualizacj\u0119 programu uruchamiaj\u0105cego, kt\u00F3ra dodaje obs\u0142ug\u0119 importu CurseForge.
