settings.fxml.curseforgeCoreApi=Klucz API CurseForge Core. Wymagane do importowania pakiet\u00F3w mod\u00F3w CurseForge wed\u0142ug adresu URL. Zdob\u0105d\u017A go na console.curseforge.com \u2192 Moje klucze API. Przechowywane w postaci zaszyfrowanej na tym komputerze przy u\u017Cyciu tego samego schematu, kt\u00F3ry chroni Tw\u00F3j token logowania do Minecrafta \u2014 nigdy nie opuszcza programu uruchamiaj\u0105cego w postaci zwyk\u0142ego tekstu.
