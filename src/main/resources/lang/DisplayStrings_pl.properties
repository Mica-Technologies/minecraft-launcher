settings.fxml.whenOffThe=Gdy jest wy\u0142\u0105czony, program uruchamiaj\u0105cy nie wy\u015Bwietli si\u0119 podczas uruchamiania ani nie wy\u015Bwietli ikony dost\u0119pno\u015Bci aktualizacji na pasku nawigacyjnym.
