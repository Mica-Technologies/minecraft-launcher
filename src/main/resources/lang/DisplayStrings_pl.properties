settings.fxml.autoRunsEvery=Automatycznie uruchamia ka\u017Cdy w\u0142\u0105czony backend poni\u017Cej, kt\u00F3ry ma dost\u0119pny sprz\u0119t, wi\u0119c mieszany sprz\u0119t (np. wentylatory Razer + klawiatura Windows Dynamic Lighting) roz\u015Bwietla wszystko na raz. Zamiast tego wybierz konkretny backend, aby wymusi\u0107 tylko ten.
