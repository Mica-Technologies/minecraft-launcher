settings.fxml.turnOffThe=Wy\u0142\u0105cz integracje, do kt\u00F3rych nie chcesz, aby program uruchamiaj\u0105cy dociera\u0142, nawet je\u015Bli ich oprogramowanie jest zainstalowane. Domy\u015Blnie wy\u0142\u0105czone dla Chroma REST, poniewa\u017C natywny zestaw SDK zast\u0119puje go w ka\u017Cdej dzia\u0142aj\u0105cej instalacji Synapse.
