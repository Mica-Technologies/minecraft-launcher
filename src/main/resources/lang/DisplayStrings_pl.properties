tooltip.settings.batteryThrottle=Spowalnia pobieranie plik\u00F3w na laptopach zasilanych z baterii, aby oszcz\u0119dza\u0107 energi\u0119. Komputery stacjonarne i urz\u0105dzenia zasilane pr\u0105dem przemiennym nigdy nie s\u0105 ograniczane.
tooltip.settings.theme=Wybierz motyw wizualny programu uruchamiaj\u0105cego. Automatycznie dopasowuje si\u0119 do ustawie\u0144 systemu operacyjnego.
