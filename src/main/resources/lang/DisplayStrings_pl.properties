crash.audio.summary=Minecraft nie m\u00F3g\u0142 zainicjowa\u0107 podsystemu audio. W systemie Linux jest to zwykle niezgodno\u015B\u0107 PulseAudio \u2194 ALSA (szczeg\u00F3lnie w kontenerach lub \u015Bwie\u017Cych instalacjach); w systemie Windows jest to zazwyczaj wy\u0142\u0105czone/od\u0142\u0105czone urz\u0105dzenie wyj\u015Bciowe. Aby obej\u015B\u0107 ten problem, mo\u017Cna tak\u017Ce wy\u0142\u0105czy\u0107 muzyk\u0119 i d\u017Awi\u0119ki w grze.
crash.audio.title=Inicjalizacja d\u017Awi\u0119ku nie powiod\u0142a si\u0119
crash.auth.summary=Gra odrzuci\u0142a token sesji dostarczony przez program uruchamiaj\u0105cy. Zwykle zapisany login wygas\u0142; wylogowanie si\u0119 z programu uruchamiaj\u0105cego i ponowne zalogowanie usuwa problem.
crash.auth.title=Minecraft nie m\u00F3g\u0142 uwierzytelni\u0107
crash.diskFull.summary=W trakcie uruchamiania systemu zabrak\u0142o miejsca na dysku. Zwolnij troch\u0119 miejsca \u2014 \u015Bwiaty z pakietami mod\u00F3w, stare zrzuty ekranu i raporty o awariach w folderze instalacyjnym pakietu s\u0105 zwykle najwi\u0119kszymi sprawcami \u2014 i spr\u00F3buj ponownie.
crash.diskFull.title=Dysk pe\u0142ny
crash.fileLock.summary=Plik, kt\u00F3ry gra pr\u00F3bowa\u0142a zapisa\u0107, zosta\u0142 zablokowany przez inny proces. W systemie Windows prawie zawsze jest to program antywirusowy (lub Windows Defender) skanuj\u0105cy pobrany mod lub \u015Brodowisko wykonawcze \u2014 spr\u00F3buj umie\u015Bci\u0107 na bia\u0142ej li\u015Bcie folder instalacyjny programu uruchamiaj\u0105cego, a nast\u0119pnie spr\u00F3buj ponownie uruchomi\u0107. Inn\u0105 popularn\u0105 poprawk\u0105 jest zamykanie klient\u00F3w OneDrive/synchronizacji wskazanych w folderze instalacyjnym.
crash.fileLock.title=Plik zablokowany przez inny proces
crash.forgeDep.summary=Mod \u201E{0}\u201D wymaga zainstalowania {1} {2}, ale nie zosta\u0142a za\u0142adowana kompatybilna wersja. Dodaj brakuj\u0105c\u0105 zale\u017Cno\u015B\u0107, zaktualizuj istniej\u0105c\u0105 do pasuj\u0105cej wersji lub usu\u0144 mod, kt\u00F3ry tego wymaga.
crash.forgeDep.title=Brakuj\u0105ca lub niedopasowana zale\u017Cno\u015B\u0107 mod\u00F3w
crash.gpu.summary=Minecraft nie m\u00F3g\u0142 zainicjowa\u0107 warstwy graficznej. Typowymi przyczynami s\u0105 nieaktualne sterowniki GPU, wybranie niew\u0142a\u015Bciwego procesora graficznego na laptopie ze zintegrowan\u0105 i oddzieln\u0105 grafik\u0105 lub sesje pulpitu zdalnego, w kt\u00F3rych OpenGL nie jest przyspieszany.
crash.gpu.title=Inicjalizacja grafiki nie powiod\u0142a si\u0119
crash.javaVersion.manifestSuffix=Wymagana wersja Java jest zwykle deklarowana w manife\u015Bcie modpacka.
crash.javaVersion.summary=Mod lub biblioteka w tym pakiecie zosta\u0142a skompilowana dla nowszej wersji Java ni\u017C aktualnie u\u017Cywana wersja \u015Brodowiska wykonawczego{0}. Na ekranie zarz\u0105dzania \u015Brodowiskiem wykonawczym programu uruchamiaj\u0105cego mo\u017Cna zainstalowa\u0107 lub wybra\u0107 inn\u0105 wersj\u0119 Java.{1}
crash.javaVersion.targetSuffix=(ten mod jest przeznaczony dla Java {0})
crash.javaVersion.title=Niezgodno\u015B\u0107 wersji Java
crash.jeiRei.summaryCollision=Identyfikator przepisu zderzy\u0142 si\u0119 pomi\u0119dzy dwoma modami \u2014 zazwyczaj, gdy dwa mody rejestruj\u0105 ten sam identyfikator przepisu lub gdy mod do zarz\u0105dzania przepisami (JEI/REI/CraftTweaker) \u0142aduje przepisy szybciej ni\u017C podstawowe modyfikacje je publikuj\u0105. Usuni\u0119cie jednego z mod\u00F3w do zarz\u0105dzania przepisami zwykle odblokowuje uruchomienie.
crash.jeiRei.summaryDual=Zainstalowane s\u0105 zar\u00F3wno elementy wystarczaj\u0105ce (JEI), jak i elementy mniej wi\u0119cej wystarczaj\u0105ce (REI). Rejestruj\u0105 te same zaczepy przegl\u0105darki przepis\u00F3w i jeden z nich zawiedzie przy ka\u017Cdym uruchomieniu. Wybierz jeden \u2014 wi\u0119kszo\u015B\u0107 nowoczesnych pakiet\u00F3w u\u017Cywa REI w Fabric i JEI w Forge.
crash.jeiRei.titleCollision=Kolizja identyfikator\u00F3w receptur
crash.jeiRei.titleDual=Konflikt JEI i REI
crash.mixin.culpritSuffix=\u2014 winowajc\u0105 wydaje si\u0119 by\u0107 miks z \u201E{0}\u201D.
crash.mixin.summary=Nie uda\u0142o si\u0119 zastosowa\u0107 \u0142atki miksuj\u0105cej moda{0}. Zwykle oznacza to, \u017Ce dwa mody pr\u00F3buj\u0105 za\u0142ata\u0107 t\u0119 sam\u0105 klas\u0119 lub jeden z nich nie obs\u0142uguje jeszcze tej wersji Minecrafta.
crash.mixin.title=Konflikt w miksowaniu mod\u00F3w
crash.modLoading.summaryGeneric=Forge nie m\u00F3g\u0142 poprawnie za\u0142adowa\u0107 mod\u00F3w tego pakietu. Najcz\u0119stszymi przyczynami s\u0105 brakuj\u0105ca zale\u017Cno\u015B\u0107, mod przeznaczony dla innej wersji Minecraft/Forge lub dwa mody, kt\u00F3re si\u0119 nie dogaduj\u0105.
crash.modLoading.summaryWithClass=Mod pr\u00F3bowa\u0142 u\u017Cy\u0107 klasy \u201E{0}\u201D, ale nie zosta\u0142 znaleziony. Zwykle oznacza to, \u017Ce brakuje wymaganego moda zale\u017Cno\u015Bci lub wkrad\u0142 si\u0119 mod z innej wersji Minecrafta/Forge.
