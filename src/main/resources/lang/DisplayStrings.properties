settings.fxml.solidSingleSteady=Solid: single steady color. Breathe: slow fade in and out (default). Pulse: faster pulse between the accent and its complement. Cycle: smooth loop through 3-4 colors — sampled from the modpack logo when a pack is in focus, otherwise analogous hues around the theme accent. Rainbow: continuous hue sweep across the full spectrum, no pack dependency.
