crash.audio.summary=Minecraft couldn't initialize the audio subsystem. On Linux this is usually a PulseAudio ↔ ALSA mismatch (especially in containers or fresh installs); on Windows it's typically a disabled / disconnected output device. Music & Sounds can also be turned off in-game as a workaround.
crash.audio.title=Audio initialization failed
crash.auth.summary=The game rejected the session token the launcher provided. Usually the saved login has expired; signing out of the launcher and signing back in clears it up.
crash.auth.title=Minecraft couldn't authenticate
crash.diskFull.summary=The system ran out of disk space mid-launch. Free some space — modpack worlds, old screenshots, and crash reports under the pack's install folder are usually the biggest offenders — and try again.
crash.diskFull.title=Disk full
crash.fileLock.summary=A file the game tried to write was locked by another process. On Windows this is almost always an antivirus (or Windows Defender) scanning the downloaded mod or runtime — try whitelisting the launcher's install folder, then retry the launch. Closing OneDrive / sync clients pointed at the install folder is the other common fix.
crash.fileLock.title=File locked by another process
crash.forgeDep.summary=Mod "{0}" needs {1} {2} installed, but a compatible version isn''t loaded. Either add the missing dependency, update the existing one to a matching version, or remove the mod that requires it.
crash.forgeDep.title=Missing or mismatched mod dependency
crash.gpu.summary=Minecraft couldn't initialize the graphics layer. The usual causes are out-of-date GPU drivers, the wrong GPU being picked on a laptop with both integrated and discrete graphics, or remote-desktop sessions where OpenGL isn't accelerated.
crash.gpu.title=Graphics initialization failed
crash.javaVersion.manifestSuffix= The required Java version is normally declared by the modpack manifest.
crash.javaVersion.summary=A mod or library in this pack was compiled for a newer Java version than the runtime currently being used{0}. The launcher''s runtime management screen can install or pick a different Java.{1}
crash.javaVersion.targetSuffix= (this mod targets Java {0})
crash.javaVersion.title=Java version mismatch
crash.jeiRei.summaryCollision=A recipe ID collided between two mods — typically when two mods register the same recipe identifier, or when a recipe-management mod (JEI / REI / CraftTweaker) is loading recipes faster than the underlying mods publish them. Removing one of the recipe-management mods usually unblocks the launch.
crash.jeiRei.summaryDual=Both Just Enough Items (JEI) and Roughly Enough Items (REI) are installed. They register the same recipe-viewer hooks and one of them will fail on every launch. Pick one — most modern packs use REI on Fabric and JEI on Forge.
crash.jeiRei.titleCollision=Recipe ID collision
crash.jeiRei.titleDual=JEI and REI conflict
crash.mixin.culpritSuffix= — mixin from "{0}" appears to be the culprit
crash.mixin.summary=A mod''s mixin patch failed to apply{0}. This usually means two mods are trying to patch the same class, or one of them doesn''t support this Minecraft version yet.
crash.mixin.title=Mod mixin conflict
crash.modLoading.summaryGeneric=Forge couldn't load this pack's mods cleanly. The most common causes are a missing dependency, a mod that targets a different Minecraft / Forge version, or two mods that don't get along.
crash.modLoading.summaryWithClass=A mod tried to use class "{0}" but it wasn''t found. That usually means a required dependency mod is missing or a mod from a different Minecraft / Forge version snuck in.
crash.modLoading.title=Mod loading failed
crash.modMcMismatch.summary=A mod in this pack was built for Minecraft {0} but the pack is launching Minecraft {1}. Either downgrade the pack''s Minecraft version, swap the mod for one built for {1}, or remove it.
crash.modMcMismatch.title=Mod built for Minecraft {0}, pack runs {1}
crash.nativeLib.summary=The JVM couldn't load one of Minecraft's native libraries (typically LWJGL or a JNI binding). The usual causes are an antivirus quarantining the file, a corrupted install, or — on Linux — a missing system library. Reinstalling the modpack usually fixes it.
crash.nativeLib.title=Couldn't load a native library
crash.oom.detailSuffix= ({0})
crash.oom.increaseRam=Increase max RAM to {0} GB
crash.oom.openRamSettings=Open RAM settings
crash.oom.summary=Minecraft ran out of memory{0}. Your launcher''s max RAM is currently {1} GB; this pack needs more.
crash.oom.systemTotal= Your system has about {0} GB total.
crash.oom.title=Out of memory
crash.optifineSodium.summary=Both OptiFine and Sodium are installed. They patch the same Minecraft rendering internals in incompatible ways and can't safely coexist — pick one. Sodium needs the Fabric loader; OptiFine works on Forge or with the OptiFabric bridge. The Disable buttons below rename one of the two jars to {name}.jar.disabled so the loader skips it on next launch.
crash.optifineSodium.title=OptiFine and Sodium are incompatible
crash.unknown.summary=We couldn''t identify a specific cause from the crash report. Exit code {0}. Check the full report below for details; the line beginning with "Caused by:" is usually the most useful starting point.
crash.unknown.title=Minecraft crashed
crash.world.summary=Minecraft choked on a save file — a chunk, region, or level.dat is unreadable. Common causes: an unexpected reboot during a previous save, two mods writing conflicting NBT, or a mod removed between sessions whose data is still on disk. Try loading a different world, or restore from a recent backup.
crash.world.title=World data couldn't be read
