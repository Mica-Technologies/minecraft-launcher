settings.fxml.test=Test
settings.fxml.flashesSolidMagenta=Flashes solid magenta (RGB 255, 0, 255) on every connected device for 2 seconds, then restores the prior effect. A steady, full-brightness flash confirms the backend is reaching your hardware. Note for Razer Chroma: Chroma Connect only forwards frames to third-party devices (case fans, strips, etc.) when a primary Razer device — keyboard, mouse, or mousepad — is also connected. If only those third-party devices flicker or stay dark, plug in a Razer keyboard/mouse and retry. Flicker with a primary device present usually means another RGB app (Synapse, iCUE, Signal RGB) is fighting for the device.
