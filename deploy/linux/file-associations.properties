# jpackage file-association metadata for the .mmcjson modpack manifest format.
# Consumed by the Linux jpackage --file-associations flag (see pom.xml). On Linux
# this populates the .deb/.rpm MimeType entry and the installed .desktop file's
# MimeType= field, which is what the file manager uses to route double-clicks.
#
# The `icon` line below uses a bare filename for readability — the build's
# stage-jar-for-jpackage antrun step rewrites it to an absolute path before
# handing the properties file to jpackage, because jpackage 25's FA_ICON
# parser is just `Path.of(string)` and a relative path fails later with
# NoSuchFileException once it's opened against the build CWD. If you change
# the filename here, update the matching <replace> token in pom.xml.
#
# The icon is a 1024×1024 PNG composing the launcher logo with a document
# badge in the lower-right corner so file managers visually distinguish a
# modpack file from the launcher app itself. Regenerate via
# `java --source 26 tools/icon-gen/MmcjsonIconGen.java` from the repo root.
extension=mmcjson
mime-type=application/x-mmcjson
description=Mica Minecraft Modpack
icon=Mica Minecraft Modpack.png
