# jpackage file-association metadata for the .mmcjson modpack manifest format.
# Consumed by the macOS jpackage --file-associations flag (see pom.xml). The icon
# path is resolved relative to this properties file's location. Reusing the app
# icon for now — a distinct .mmcjson icon would be a future design pass.
extension=mmcjson
mime-type=application/x-mmcjson
description=Mica Minecraft Modpack
icon=Mica Minecraft Launcher.icns
